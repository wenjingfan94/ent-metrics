  {
    id: "SL-098",
    name: `酒店C端底价比价指标`,
    category: "商旅_价格",
    tags: [],
    scenario: "供应链_价格",
    tables: "",
    frequency: "T+1",
    owner: "weimeifang",
    updated: "",
    notes: `详见商旅白皮书：https://cooper.didichuxing.com/docs2/document/2206135919513`,
    sql: `select 
    query_date as '查询日期'
    ,cmp_htl_cnt as '酒店底价比价次数'
    ,norm_cmp_htl_cnt as '非好价客户酒店底价比价次数（非好价客户酒店全部产品底价比价次数）'	
    ,good1_cmp_htl_cnt as '好价基础版酒店底价比价次数（好价基础版酒店全部产品底价比价次数）'	
    ,good2_cmp_htl_cnt as '好价加磅版酒店底价比价次数（好价加磅版酒店全部产品底价比价次数）'	
    ,norm_cmp_htl_cnt  as '特殊客户酒店底价比价次数（特殊客户酒店全部产品底价比价次数）'	

    ,cmp_prd_cnt as '酒店产品底价比价次数'
    ,norm_all_prd_room_brk_supplier_prd_cnt as '非好价客户产品底价比价次数（非好价客户全部产品底价比价次数）'	
    ,good1_all_prd_room_brk_supplier_prd_cnt as '好价基础版产品底价比价次数（好价基础版全部产品底价比价次数）'	
    ,good2_all_prd_room_brk_supplier_prd_cnt as '好价加磅版产品底价比价次数（好价加磅版全部产品底价比价次数）'
    ,norm_all_prd_room_brk_supplier_prd_cnt as '特殊客户产品底价比价次数（特殊客户全部产品底价比价次数）'	
	
    ,norm_all_prd_room_brk_supplier_bm_cnt as '非好价客户产品底价BM次数（非好价客户全部产品底价BM次数）'	
    ,good1_all_prd_room_brk_supplier_bm_cnt as '好价基础版产品底价BM次数（好价基础版全部产品底价BM次数）'	
    ,good2_all_prd_room_brk_supplier_bm_cnt as '好价加磅版产品底价BM次数（好价加磅版全部产品底价BM次数）'
    ,norm_all_prd_room_brk_supplier_bm_cnt as '特殊客户产品底价BM次数（特殊客户全部产品底价BM次数）'

    
    ,low_member_per as '低价产品浏览占比'
    ,not_good_price_night_cnt as '非好价客户间夜数'	
    ,good_price_night_cnt_fix as '好价客户间夜数'	
    ,special_night_cnt as '特殊客户间夜数'	
    ,norm_cus_night_per as '非好价客户间夜占比'	
    ,good_cus_night_per as '好价客户间夜占比'	
    ,special_cus_night_per as '特殊客户间夜占比'	
    ,good1_cus_night_per as '好价基础版间夜占比'	
    ,good2_cus_night_per as '好价加磅版间夜占比'	
    ,norm_all_prd_room_brk_supplier_bmr as '非好价客户酒店产品底价BM率（非好价客户酒店全部产品底价BM率）'	
    ,norm_norm_prd_room_brk_supplier_bmr as '非好价客户普通产品底价BM率'	
    ,good1_all_prd_room_brk_supplier_bmr as '好价基础版酒店产品底价BM率（好价基础版酒店全部产品底价BM率）'	
    ,good1_norm_prd_room_brk_supplier_bmr as '好价基础版普通产品底价BM率'	
    ,good2_all_prd_room_brk_supplier_bmr as '好价加磅版酒店产品底价BM率（好价加磅版酒店全部产品底价BM率）'	
    ,good2_norm_prd_room_brk_supplier_bmr as '好价加磅版酒店普通产品底价BM率'	
    ,good_all_prd_room_brk_supplier_bmr as '好价客户酒店产品底价BM率（好价客户酒店全部产品底价BM率）'	
    ,special_all_prd_room_brk_supplier_bmr as '特殊客户酒店产品底价BM率（特殊客户酒店全部酒店产品底价BM率）'
    -- 2025年12月前，酒店综合产品bm率=全部产品BM率*全部产品浏览占比+普通产品BM率*普通产品浏览占比，不含好价和特殊策略
    -- 2025年12月开始，酒店综合产品BM率=非好价客户酒店产品BM率 * 非好价客户间夜占比 +好价客户酒店产品BM率 * 好价客户间夜占比+特殊客户酒店产品BM率 * 特殊客户间夜占比，
    ,case when substr(query_date,1,7) < '2025-12' then norm_all_prd_room_brk_supplier_bmr * (1-low_member_per) + norm_norm_prd_room_brk_supplier_bmr * low_member_per 
        else nvl(norm_all_prd_room_brk_supplier_bmr,0) * nvl(norm_cus_night_per,0)
        + nvl(good_all_prd_room_brk_supplier_bmr,0) * nvl(good_cus_night_per,0)
        + nvl(special_all_prd_room_brk_supplier_bmr,0) * nvl(special_cus_night_per,0)
        end as '酒店综合产品BM率（酒店综合产品底价BM率）'
    --  ,norm_all_prd_room_brk_supplier_bmr * (1-low_member_per) + norm_norm_prd_room_brk_supplier_bmr * low_member_per as '酒店综合产品BM率(2512前)' --也是非好价综合产品BM率(2512前)
    --2025年12月开始，酒店综合产品BM率=非好价客户酒店产品BM率 * 非好价客户间夜占比 +好价客户酒店产品BM率 * 好价客户间夜占比+特殊客户酒店产品BM率 * 特殊客户间夜占比，
    -- ,nvl(norm_all_prd_room_brk_supplier_bmr,0) * nvl(norm_cus_night_per,0)
    -- + nvl(good_all_prd_room_brk_supplier_bmr,0) * nvl(good_cus_night_per,0)
    -- + nvl(special_all_prd_room_brk_supplier_bmr,0) * nvl(special_cus_night_per,0)
    --  as '酒店综合产品BM率(2512开始)' 

from 
(
    select 
        substr(query_date,1,10) query_date
        ,(sum(norm_all_prd_room_brk_supplier_prd_cnt) + sum(good1_all_prd_room_brk_supplier_prd_cnt)  + sum(good2_all_prd_room_brk_supplier_prd_cnt))/sum(strategy_cnt) as cmp_prd_cnt -- 注意分母
        ,(sum(norm_cmp_htl_cnt) + sum(good1_cmp_htl_cnt)  + sum(good2_cmp_htl_cnt))/sum(strategy_cnt) as cmp_htl_cnt
        ,sum(norm_cmp_htl_cnt) as norm_cmp_htl_cnt -- '非好价比价酒店次数'
        ,sum(good1_cmp_htl_cnt) as good1_cmp_htl_cnt -- '好价基础版比价酒店次数'
        ,sum(good2_cmp_htl_cnt) as good2_cmp_htl_cnt -- '好价加磅版比价酒店次数' 
        ,sum(norm_all_prd_room_brk_supplier_bm_cnt) as norm_all_prd_room_brk_supplier_bm_cnt -- 非好价客户全部产品BM次数，也是非好价客户产品BM次数
        ,sum(norm_all_prd_room_brk_supplier_prd_cnt) as norm_all_prd_room_brk_supplier_prd_cnt -- 非好价客户全部产品比价次数，也是非好价客户产品比价次数
        ,sum(norm_norm_prd_room_brk_supplier_bm_cnt) as norm_norm_prd_room_brk_supplier_bm_cnt -- 非好价客户普通产品BM次数
        ,sum(norm_norm_prd_room_brk_supplier_prd_cnt) as norm_norm_prd_room_brk_supplier_prd_cnt -- 非好价客户普通产品BM次数
        ,sum(good1_all_prd_room_brk_supplier_bm_cnt) as good1_all_prd_room_brk_supplier_bm_cnt -- 好价基础版全部产品BM次数，好价基础版产品BM次数
        ,sum(good1_all_prd_room_brk_supplier_prd_cnt) as good1_all_prd_room_brk_supplier_prd_cnt -- 好价基础版全部产品比价次数，好价基础版产品比价次数'
        ,sum(good2_all_prd_room_brk_supplier_bm_cnt) as good2_all_prd_room_brk_supplier_bm_cnt -- 好价加磅版全部产品BM次数，好价基础版产品BM次数
        ,sum(good2_all_prd_room_brk_supplier_prd_cnt) as good2_all_prd_room_brk_supplier_prd_cnt  -- 好价加磅版全部产品比价次数，好价基础版产品比价次数

        --浏览占比
        ,sum(low_member_cnt)/sum(member_cnt) as low_member_per
        --间夜占比
        ,sum(not_good_price_night_cnt) as not_good_price_night_cnt
        ,sum(good_price_night_cnt_fix) as good_price_night_cnt_fix
        ,sum(special_night_cnt) as special_night_cnt

        ,sum(not_good_price_night_cnt) / sum(all_night_cnt_fix) as norm_cus_night_per-- '非好价客户间夜占比'
        ,sum(good_price_night_cnt_fix) / sum(all_night_cnt_fix) as good_cus_night_per -- '好价客户间夜占比'
        ,sum(special_night_cnt) / sum(all_night_cnt_fix) as special_cus_night_per -- '特殊客户间夜占比'
        ,sum(good_price_base_night_cnt_fix) / sum(good_price_base_night_cnt_fix + good_price_advanced_night_cnt_fix) as good1_cus_night_per-- '好价基础版间夜占比'
        ,sum(good_price_advanced_night_cnt_fix) / sum(good_price_base_night_cnt_fix + good_price_advanced_night_cnt_fix) as good2_cus_night_per -- '好价加磅版间夜占比'
        
        --2025年12月以前老口径，2025年12月开始新口径，其中2025年12月1日-2025年12月11日没有好价策略，2025年12月12日开始有好价策略
        ,sum(norm_all_prd_room_brk_supplier_bm_cnt) / sum(norm_all_prd_room_brk_supplier_prd_cnt) as norm_all_prd_room_brk_supplier_bmr -- '非好价客户全部产品底价BM率'
        ,sum(norm_norm_prd_room_brk_supplier_bm_cnt) / sum(norm_norm_prd_room_brk_supplier_prd_cnt) as norm_norm_prd_room_brk_supplier_bmr -- '非好价客户普通产品底价BM率'
        ,sum(good1_all_prd_room_brk_supplier_bm_cnt) / sum(good1_all_prd_room_brk_supplier_prd_cnt) as good1_all_prd_room_brk_supplier_bmr -- '好价基础版产品底价BM率' -- 也是'好价基础版全部产品底价BM率'
        ,sum(good1_norm_prd_room_brk_supplier_bm_cnt) / sum(good1_norm_prd_room_brk_supplier_prd_cnt) as good1_norm_prd_room_brk_supplier_bmr -- '好价基础版普通产品底价BM率' 
        ,sum(good2_all_prd_room_brk_supplier_bm_cnt) / sum(good2_all_prd_room_brk_supplier_prd_cnt) as good2_all_prd_room_brk_supplier_bmr -- '好价加磅版产品底价BM率' -- 也是'好价加磅版全部产品底价BM率'
        ,sum(good2_norm_prd_room_brk_supplier_bm_cnt) / sum(good2_norm_prd_room_brk_supplier_prd_cnt) as good2_norm_prd_room_brk_supplier_bmr -- '好价加磅版普通产品底价BM率' 
        --好价客户产品BM率 = 好价基础版BM率 * 好价基础版本间夜占比 + 好价加磅版BM率 * 好价加磅版本间夜占比
        ,sum(good1_all_prd_room_brk_supplier_bm_cnt) / sum(good1_all_prd_room_brk_supplier_prd_cnt) * sum(good_price_base_night_cnt_fix)/sum(good_price_base_night_cnt_fix + good_price_advanced_night_cnt_fix) 
            + sum(good2_all_prd_room_brk_supplier_bm_cnt) / sum(good2_all_prd_room_brk_supplier_prd_cnt) * sum(good_price_advanced_night_cnt_fix)/sum(good_price_base_night_cnt_fix + good_price_advanced_night_cnt_fix) as  good_all_prd_room_brk_supplier_bmr-- '好价客户产品底价BM率' -- 也是'好价客户全部产品底价BM率' 
        ,sum(special_all_prd_room_brk_supplier_bm_cnt) / sum(special_all_prd_room_brk_supplier_prd_cnt) as special_all_prd_room_brk_supplier_bmr -- '特殊客户产品底价BM率' -- 也是'特殊客户全部产品底价BM率'

        ---------------------------
        

    from 
    (
            ---天数据聚合
            select t_cmp.query_date
                    ,strategy_cnt     
                    ,norm_all_prd_room_brk_supplier_prd_cnt
                    ,norm_norm_prd_room_brk_supplier_prd_cnt
                    ,norm_all_prd_room_brk_supplier_bm_cnt
                    ,norm_norm_prd_room_brk_supplier_bm_cnt
                    --好价客户比价
                    ,good1_all_prd_room_brk_supplier_prd_cnt
                    ,good1_norm_prd_room_brk_supplier_prd_cnt
                    ,good1_all_prd_room_brk_supplier_bm_cnt
                    ,good1_norm_prd_room_brk_supplier_bm_cnt
                    ,good2_all_prd_room_brk_supplier_prd_cnt
                    ,good2_norm_prd_room_brk_supplier_prd_cnt
                    ,good2_all_prd_room_brk_supplier_bm_cnt
                    ,good2_norm_prd_room_brk_supplier_bm_cnt
                    --- 特殊客户比价
                    ,special_all_prd_room_brk_supplier_prd_cnt
                    ,special_norm_prd_room_brk_supplier_prd_cnt
                    ,special_all_prd_room_brk_supplier_bm_cnt
                    ,special_norm_prd_room_brk_supplier_bm_cnt

                    ,norm_cmp_htl_cnt -- '非好价比价酒店次数'
                    ,good1_cmp_htl_cnt -- '好价基础版比价酒店次数'
                    ,good2_cmp_htl_cnt -- '好价加磅版比价酒店次数' 
                    -- 浏览占比
                    ,coalesce(t_view.low_member_cnt,0) as low_member_cnt
                    ,coalesce(t_view.member_cnt,0) as member_cnt
                    -- 间夜占比
                    ,coalesce(not_good_price_night_cnt,0) as not_good_price_night_cnt     --非好价比价-间夜数
                    ,coalesce(good_price_base_night_cnt_fix,0) as good_price_base_night_cnt_fix
                    ,coalesce(good_price_advanced_night_cnt_fix,0) as good_price_advanced_night_cnt_fix
                    ,coalesce(good_price_night_cnt_fix,0) as good_price_night_cnt_fix
                    ,coalesce(special_night_cnt,0) as special_night_cnt 
                    ,coalesce(all_night_cnt_fix,0) as all_night_cnt_fix

                    
            from (
                select query_date
                    ,count(distinct good_price_strategy) as strategy_cnt
                    --非好价客户比价
                    ,count(case when good_price_strategy='非好价比价' and is_all_prd_room_brk_supplier_cmp = 1 then concat(query_date,didi_hotel_id) else null end) as  norm_all_prd_room_brk_supplier_prd_cnt
                    ,count(case when good_price_strategy='非好价比价' and is_norm_prd_room_brk_supplier_cmp = 1 then concat(query_date,didi_hotel_id) else null end) as norm_norm_prd_room_brk_supplier_prd_cnt
                    ,count(case when good_price_strategy='非好价比价' and is_all_prd_room_brk_supplier_cmp = 1 and supplier_compare_result in ('beat','meet') then concat(query_date,didi_hotel_id) else null end) as norm_all_prd_room_brk_supplier_bm_cnt
                    ,count(case when good_price_strategy='非好价比价' and is_norm_prd_room_brk_supplier_cmp = 1 and supplier_compare_result in ('beat','meet') then concat(query_date,didi_hotel_id) else null end) as norm_norm_prd_room_brk_supplier_bm_cnt
                    --好价客户比价
                    ,count(case when good_price_strategy='好价基础版' and is_all_prd_room_brk_supplier_cmp = 1 then concat(query_date,didi_hotel_id) else null end) as good1_all_prd_room_brk_supplier_prd_cnt
                    ,count(case when good_price_strategy='好价基础版' and is_norm_prd_room_brk_supplier_cmp = 1 then concat(query_date,didi_hotel_id) else null end) as good1_norm_prd_room_brk_supplier_prd_cnt
                    ,count(case when good_price_strategy='好价基础版' and is_all_prd_room_brk_supplier_cmp = 1 and supplier_compare_result in ('beat','meet') then concat(query_date,didi_hotel_id) else null end) as good1_all_prd_room_brk_supplier_bm_cnt
                    ,count(case when good_price_strategy='好价基础版' and is_norm_prd_room_brk_supplier_cmp = 1 and supplier_compare_result in ('beat','meet') then concat(query_date,didi_hotel_id) else null end) as good1_norm_prd_room_brk_supplier_bm_cnt
                    ,count(case when good_price_strategy='好价加磅版' and is_all_prd_room_brk_supplier_cmp = 1 then concat(query_date,didi_hotel_id) else null end) as good2_all_prd_room_brk_supplier_prd_cnt
                    ,count(case when good_price_strategy='好价加磅版' and is_norm_prd_room_brk_supplier_cmp = 1 then concat(query_date,didi_hotel_id) else null end) as good2_norm_prd_room_brk_supplier_prd_cnt
                    ,count(case when good_price_strategy='好价加磅版' and is_all_prd_room_brk_supplier_cmp = 1 and supplier_compare_result in ('beat','meet') then concat(query_date,didi_hotel_id) else null end) as good2_all_prd_room_brk_supplier_bm_cnt
                    ,count(case when good_price_strategy='好价加磅版' and is_norm_prd_room_brk_supplier_cmp = 1 and supplier_compare_result in ('beat','meet') then concat(query_date,didi_hotel_id) else null end) as good2_norm_prd_room_brk_supplier_bm_cnt
                    --- 特殊客户比价
                    ,count(case when good_price_strategy='非好价比价' and is_all_prd_room_brk_supplier_cmp = 1 then concat(query_date,didi_hotel_id) else null end) as special_all_prd_room_brk_supplier_prd_cnt
                    ,count(case when good_price_strategy='非好价比价' and is_norm_prd_room_brk_supplier_cmp = 1 then concat(query_date,didi_hotel_id) else null end) as special_norm_prd_room_brk_supplier_prd_cnt
                    ,count(case when good_price_strategy='非好价比价' and is_all_prd_room_brk_supplier_cmp = 1 and supplier_compare_result in ('beat','meet') then concat(query_date,didi_hotel_id) else null end) as special_all_prd_room_brk_supplier_bm_cnt
                    ,count(case when good_price_strategy='非好价比价' and is_norm_prd_room_brk_supplier_cmp = 1 and supplier_compare_result in ('beat','meet') then concat(query_date,didi_hotel_id) else null end) as special_norm_prd_room_brk_supplier_bm_cnt

                    ,count(distinct case when good_price_strategy='非好价比价' and is_all_prd_room_brk_supplier_cmp = 1 then concat(query_date,didi_hotel_id) else null end) as norm_cmp_htl_cnt -- '非好价比价酒店次数'
                    ,count(distinct case when good_price_strategy='好价基础版' and is_all_prd_room_brk_supplier_cmp = 1 then concat(query_date,didi_hotel_id) else null end) as good1_cmp_htl_cnt -- '好价基础版比价酒店次数'
                    ,count(distinct case when good_price_strategy='好价加磅版' and is_all_prd_room_brk_supplier_cmp = 1 then concat(query_date,didi_hotel_id) else null end) as good2_cmp_htl_cnt -- '好价加磅版比价酒店次数'
                from es_dw.dm_ent_mkt_hotel_price_comparison_df 
                where dt = date_sub(current_date,1)
                and query_date between '2025-11-01' and date_sub(current_date,1)
                and room_rank_bf_assoc between 1 and 4
                and sample_type not in ('好价样本','固定样本')
                and (
                            is_all_prd_room_brk_supplier_cmp = 1 --'全部产品早底价比价'-- 含低价产品的全部产品
                            or is_norm_prd_room_brk_supplier_cmp = 1 --'普通产品早底价比价'-- 
                            or is_all_prd_room_brk_supplier_cmp = 1 --'全部产品早底价比价'--
                            or is_norm_prd_room_brk_supplier_cmp = 1 --'普通产品早底价比价'--
                )
                group by query_date

            ) t_cmp 
            left join 
            (
                select a.calendar_date as stat_date
                    ,case when calendar_date<'2025-01-01' then 0 else coalesce(b.low_member_cnt,0) end as low_member_cnt --低价产品浏览次数
                    ,coalesce(b.member_cnt,0) as member_cnt --总浏览次数
                    ,coalesce(b.low_member_rate,0) as low_member_rate -- 低价产品浏览占比
                from (
                    select calendar_date
                    from whole_dw.dim_date
                    where dt= date_sub(current_date,1)
                    and calendar_date between '2024-03-04' and '2025-11-30'
                ) a 
                left join (
                select stat_date --统计时间
                    ,case when dt<'2025-01-01' then 0 else low_hotel_member_cnt end as low_member_cnt --低价产品访问次数
                    ,hotel_member_cnt member_cnt --总访问人次
                    ,low_hotel_member_cnt/hotel_member_cnt as low_member_rate
                from es_dw.dwm_ent_log_omega_stat_info_view_di
                where dt between '2024-03-04' and '2025-11-30'
                ) b 
                on a.calendar_date=b.stat_date
            ) as t_view on t_cmp.query_date = t_view.stat_date
            left join 
            (
                SELECT
                    stat_date,
                    good_price_base_night_cnt,      --好价基础版-间夜数
                    good_price_advanced_night_cnt,  --好价加磅版-间夜数
                    special_night_cnt,   --特殊版-间夜数
                    not_good_price_night_cnt,       --非好价比价-间夜数
                    all_night_cnt                   --所有产品-间夜数
                    --2025-12-12没有好价比价数据，间夜占比人为设置为0，通过修改分子分母实现
                    ,case when stat_date < '2025-12-12' then 0 else good_price_base_night_cnt end as good_price_base_night_cnt_fix
                    ,case when stat_date < '2025-12-12' then 0 else good_price_advanced_night_cnt end as good_price_advanced_night_cnt_fix
                    ,case when stat_date < '2025-12-12' then 0 else good_price_base_night_cnt end + case when stat_date < '2025-12-12' then 0 else good_price_advanced_night_cnt end as good_price_night_cnt_fix
                    ,case when stat_date < '2025-12-12' then special_night_cnt + not_good_price_night_cnt else all_night_cnt end as all_night_cnt_fix
                FROM
                    es_dw.dm_ent_mkt_hotel_price_company_type_night_cnt_df
                WHERE
                    dt = date_sub(current_date,1)    --dt = date_sub(current_date,1)
                    and stat_date between '2025-12-01' and date_sub(current_date,1)

            ) as t_night_per on t_cmp.query_date = t_night_per.stat_date
    ) t_date_concat
    group by substr(query_date,1,10) 
)t_detail 

;`
  },
  {
    id: "SL-099",
    name: `国内酒店数`,
    category: "商旅_覆盖率",
    tags: [],
    scenario: "供应链_覆盖率",
    tables: "",
    frequency: "T+1",
    owner: "weimeifang",
    updated: "",
    notes: `国内（境内）有报价母酒店数量，有报价按最低价格大于1且小于100万计`,
    sql: `select 
count(distinct if(low_price>1 and low_price<1000000,didi_hotel_id,null)) as htl_cnt 
from 
(
    select 
        t_hotel.*
    from (
        select 
            didi_hotel_id

  {
    id: "SL-110",
    name: `超时确认率`,
    category: "商旅_服务质量",
    tags: [],
    scenario: "供应链_服务质量",
    tables: "",
    frequency: "T+1",
    owner: "weimeifang",
    updated: "",
    notes: `超时确认订单数 / 酒店总创建订单数 超时确认：当天入住订单，确认时间超过1小时为超时，非当天入住订单，确认时间超过2小时为超时`,
    sql: `select 
    supplier_id
    ,supplier_name
    ,count(distinct case when is_confirm=1 then order_id else null end) as confirm_cnt -- 确认订单
    ,count(distinct case when is_over_time=1 then order_id else null end) as overtime_cnt -- 超时确认订单
    ,count(distinct case when is_over_time=1 then order_id else null end)/count(distinct case when is_confirm=1 then order_id else null end) as '超时确认率'

from 
(
 select
                order_id
                , company_id
                , supplier_id
                , supplier_name
                ,case when substr(confirm_time,1,10) > '1970-01-01' then 1 else 0 end as is_confirm -- 是否供应商确认
                -- 当天入住，1小时，非当天入住2小时
                ,case
                    -- ①预计到店日期=支付日期，供应商确认时间-支付时间大于60分钟
                    when substr(confirm_time,1,10) > '1970-01-01' and substring(estimated_arrival_time, 1, 10) = substring(pay_time, 1, 10)
                        and floor((unix_timestamp(confirm_time,'yyyy-MM-dd HH:mm:ss') - unix_timestamp(pay_time,'yyyy-MM-dd HH:mm:ss')) / 60) > 60 then 1
                    -- ②预计到店日期=支付日期，供应商确认时间-支付时间大于120分钟
                    when substr(confirm_time,1,10) > '1970-01-01' and substring(estimated_arrival_time, 1, 10) > substring(pay_time, 1, 10)
                        and floor((unix_timestamp(confirm_time,'yyyy-MM-dd HH:mm:ss') - unix_timestamp(pay_time,'yyyy-MM-dd HH:mm:ss')) / 60) > 120 then 1
                    else 0
                end as is_over_time -- 判断是否超时
                -- 及时确认 5分钟内确认 
            from es_dw.dm_ent_hotel_order_info_df
            where
                dt = '\${BIZ_DATE_LINE}'
                and to_date(create_time) >= date_sub('\${BIZ_DATE_LINE}',31)
                and supplier_id not in (23,14) -- 排除测试接口 和 单体协议酒店
                and is_test_company=0
                and is_agreement=0
)t 
group by supplier_id
    , supplier_name`

    notes: `滴滴商旅在交易过程中，从客户侧收取的费用减去为销售该产品支付的成本，包含从客户侧获取的收入和从供应链侧获取的收入，截面“出+改-退”口径；商旅收入/商旅GMV`,

let state={data:[],activeCategory:'all',searchQuery:'',expandedId:null,modalType:null,editingItem:null,toastMsg:null,pendingImport:null};

function loadData(){
  try{const s=localStorage.getItem(STORAGE_KEY);if(s){state.data=JSON.parse(s)}else{state.data=[...DEFAULT_DATA];saveData()}}
  catch(e){state.data=[...DEFAULT_DATA]}
  // 按 Delete 键清空缓存并刷新
  document.addEventListener('keydown',e=>{if(e.key==='Delete'&&e.ctrlKey){localStorage.removeItem(STORAGE_KEY);state.data=[...DEFAULT_DATA];saveData();render();alert('缓存已清空');}});
}
function saveData(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state.data))}

function searchItems(query){
  if(!query.trim())return getFilteredItems();
  const terms=query.toLowerCase().split(/[\s,，、]+/).filter(Boolean);
  return getFilteredItems().map(item=>{
    let score=0;
    const fields=[
      {t:(item.id||'').toLowerCase(),w:10},{t:(item.name||'').toLowerCase(),w:8},
      {t:(item.tags||[]).join(' ').toLowerCase(),w:6},{t:(item.notes||'').toLowerCase(),w:4},
      {t:(item.tables||'').toLowerCase(),w:5},{t:(item.category||'').toLowerCase(),w:3},
      {t:(item.owner||'').toLowerCase(),w:3},{t:(item.sql||'').toLowerCase(),w:1}
    ];
    for(const term of terms){for(const f of fields){if(f.t.includes(term)){score+=f.w;if(f.t.startsWith(term))score+=2}}}
    const syn={'毛利':['margin','成本'],'分层':['分级','SA','tier'],'衰退':['流失','挽回','churn'],
      '场景':['加班','差旅','接送机'],'怎么算':['口径','定义','计算'],'客户':['企业','enterprise'],
      '收入':['GMV','营收'],'线索':['MAL','MQL','lead'],'商机':['SQL','赢单','转化'],
      '账户':['激活','活跃','有效'],'价格':['CPM','实付','应付'],'完单':['单量','订单'],
      '应答':['成交','体验'],'新客':['首次','自然年','新签']};
    for(const[k,vs]of Object.entries(syn)){
      if(terms.some(t=>t.includes(k)||k.includes(t))){
        for(const f of fields){if(vs.some(v=>f.t.includes(v.toLowerCase())))score+=f.w*0.5}}}
    return{...item,_s:score};
  }).filter(i=>i._s>0).sort((a,b)=>b._s-a._s);
}
function getFilteredItems(){
  if(state.activeCategory==='all')return state.data;
  if(state.activeCategory==='yc_all')return state.data.filter(d=>!d.id||!d.id.startsWith('SL-'));
  if(state.activeCategory==='sl_all')return state.data.filter(d=>d.id&&d.id.startsWith('SL-'));
  return state.data.filter(d=>d.category===state.activeCategory);
}
function highlightSQL(sql){
  const e=sql.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return e
    .replace(/(--[^\n]*)/g,'<span class="cmt">$1</span>')
    .replace(/('[^']*')/g,'<span class="str">$1</span>')
    .replace(/(\$\{[^}]+\})/g,'<span class="var">$1</span>')
    .replace(/\b(SELECT|FROM|WHERE|AND|OR|NOT|IN|ON|AS|JOIN|LEFT|RIGHT|INNER|OUTER|GROUP|BY|ORDER|HAVING|LIMIT|UNION|ALL|DISTINCT|CASE|WHEN|THEN|ELSE|END|WITH|INSERT|INTO|VALUES|SET|IS|NULL|LIKE|BETWEEN|EXISTS|PARTITION|OVER|ROWS|PRECEDING|FOLLOWING|UNBOUNDED|IF|LATERAL|VIEW|EXPLODE|CROSS|DESC|ASC)\b/gi,m=>'<span class="kw">'+m.toUpperCase()+'</span>')
    .replace(/\b(COUNT|SUM|AVG|MIN|MAX|ROUND|COALESCE|NULLIF|CONCAT|CONCAT_WS|DATE_FORMAT|DATEDIFF|DATE_SUB|DATE_ADD|ADD_MONTHS|HOUR|DAYOFWEEK|LAG|LEAD|ROW_NUMBER|RANK|DENSE_RANK|LOWER|UPPER|SUBSTR|SUBSTRING|TRIM|CAST|NVL|COLLECT_SET|COLLECT_LIST|SIZE|SPLIT|GET_JSON_OBJECT|CURRENT_DATE|REGEXP_REPLACE|LENGTH|INSTR|LOCATE|ABS|CEIL|FLOOR|POWER|MOD|GREATEST|LEAST|MONTHS_BETWEEN)\b/gi,m=>'<span class="fn">'+m.toUpperCase()+'</span>')
    .replace(/\b(\d+(?:\.\d+)?)\b/g,'<span class="num">$1</span>');
}
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function showToast(m){state.toastMsg=m;render();setTimeout(()=>{state.toastMsg=null;render()},2000)}

  document.getElementById('content').innerHTML=`

        :results.map(renderCard).join('')}`;
  
  // 处理 modal
  let modalHtml='';
  if(state.modalType==='add'||state.modalType==='edit')modalHtml=renderFormModal();
  if(state.modalType==='import')modalHtml=renderImportModal();
  if(state.modalType==='importConflict')modalHtml=renderConflictModal();
  const existingModal=document.getElementById('modal-container');
  if(existingModal){existingModal.innerHTML=modalHtml;if(!modalHtml)existingModal.remove()}
  else if(modalHtml){
    const modalDiv=document.createElement('div');
    modalDiv.id='modal-container';
    modalDiv.innerHTML=modalHtml;
    document.body.appendChild(modalDiv);
  }
  
  // 处理 toast
  let toastHtml='';
  if(state.toastMsg)toastHtml=`<div class="toast">${escHtml(state.toastMsg)}</div>`;

  else if(toastHtml){

    toastDiv.style.cssText='position:fixed;bottom:20px;right:20px;z-index:2000';
    toastDiv.innerHTML=toastHtml;

  const ex=state.expandedId===item.id;
  return `<div class="sql-card ${ex?'expanded':''}">
    <div class="card-header" onclick="toggleCard('${item.id}')">
      <span class="card-id" style="background:${c.bg};color:${c.color}">${item.id}</span>
      <span class="card-name">${escHtml(item.name)}</span>
      <span class="card-owner">@${escHtml(item.owner)}</span>
      <span class="card-arrow">▼</span>
    </div>
    ${ex?`<div class="card-body">
      <div class="card-tags">${item.tags.map(t=>`<span class="tag">#${escHtml(t)}</span>`).join('')}</div>

      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:600;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${nm}">${nm}</div>
        <div style="font-size:11px;color:var(--text-muted);margin-top:2px">与已有条目 <b style="color:var(--accent)">${escHtml(c.existing.id)}</b>「${escHtml(c.existing.name)}」同名</div>
      </div>
      <div style="display:flex;gap:6px;flex-shrink:0">
        <button class="btn ${dec==='overwrite'?'btn-primary':'btn-ghost'}" style="font-size:11px;padding:3px 10px" onclick="setConflictDecision('${safeName}','overwrite')">覆盖</button>
        <button class="btn ${dec==='ignore'?'btn-danger':'btn-ghost'}" style="font-size:11px;padding:3px 10px" onclick="setConflictDecision('${safeName}','ignore')">忽略</button>
      </div>
    </div>`;
  }).join('');
  return `<div class="modal-overlay" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()" style="width:540px">
    <div class="modal-header"><h2>发现重复口径</h2><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <p style="font-size:12px;color:var(--text-secondary);margin-bottom:12px">以下 <b>${conflicts.length}</b> 条口径与已有数据同名，请选择处理方式（默认忽略）：</p>
      <div style="display:flex;gap:8px;margin-bottom:10px">
        <button class="btn btn-ghost" style="font-size:11px" onclick="setAllConflictDecision('overwrite')">全部覆盖</button>
        <button class="btn btn-ghost" style="font-size:11px" onclick="setAllConflictDecision('ignore')">全部忽略</button>
      </div>
      <div style="max-height:340px;overflow-y:auto">${rows}</div>
    </div>
    <div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="confirmImport()">确认导入</button></div>
  </div></div>`;
}
function setConflictDecision(name,decision){
  if(state.pendingImport)state.pendingImport.decisions[name]=decision;
  render();
}
function setAllConflictDecision(decision){
  if(state.pendingImport)Object.keys(state.pendingImport.decisions).forEach(k=>state.pendingImport.decisions[k]=decision);
  render();
}
function confirmImport(){
  if(!state.pendingImport)return;
  const {newItems,conflicts,decisions}=state.pendingImport;
  let a=newItems.length,u=0;
  newItems.forEach(item=>state.data.push(item));
  conflicts.forEach(c=>{
    if(decisions[c.imported.name]==='overwrite'){
      const idx=state.data.findIndex(d=>d.name===c.imported.name);
      if(idx>=0){state.data[idx]=c.imported;u++;}
    }
  });
  state.pendingImport=null;
  saveData();showToast("✅ 新增"+a+"条，更新"+u+"条");closeModal();
}

function setCategory(c){state.activeCategory=c;state.searchQuery='';state.expandedId=null;render()}
function onSearch(v){state.searchQuery=v;state.expandedId=null;render();const i=document.getElementById('si');if(i){i.focus();i.selectionStart=i.selectionEnd=v.length}}

function handleSearchInput(v){if(window._composing)return;onSearch(v);}
function toggleCard(id){state.expandedId=state.expandedId===id?null:id;render()}
function copySQL(id){const item=state.data.find(d=>d.id===id);if(!item)return;navigator.clipboard.writeText(item.sql).then(()=>{const b=document.getElementById('cp-'+id);if(b){b.textContent='✓ 已复制';b.classList.add('copied')}setTimeout(()=>{const b2=document.getElementById('cp-'+id);if(b2){b2.textContent='复制SQL';b2.classList.remove('copied')}},1500)})}
function openAdd(){
  state.modalType='add';
  // 生成默认 ID: 查找最大的 YC 编号并 +1
  const maxId=state.data.filter(d=>d.id&&d.id.startsWith('YC-')).reduce((max,d)=>{
    const n=parseInt(d.id.slice(3));return n>max?n:max;
  },0);
  const nextId='YC-'+String(maxId+1).padStart(3,'0');
  state.editingItem={category:'售前_线索商机',id:nextId,_autoId:true};
  render()
}
function openEdit(id){const i=state.data.find(d=>d.id===id);if(!i)return;state.modalType='edit';state.editingItem={...i};render()}
function closeModal(){state.modalType=null;state.editingItem=null;render()}
function saveForm(){
  const id=document.getElementById('f-id').value.trim(),name=document.getElementById('f-name').value.trim(),sql=document.getElementById('f-sql').value.trim();
  if(!name||!sql){alert('请填写口径名称和 SQL');return}
  const finalId=id||state.editingItem?.id;
  if(!finalId){alert('ID 不能为空');return}
  const item={id:finalId,name,category:document.getElementById('f-cat').value,
    tags:[],scenario:'',tables:'',frequency:'T+1',
    owner:'',updated:new Date().toISOString().slice(0,10),
    notes:document.getElementById('f-notes').value.trim(),sql};
  if(state.modalType==='edit'){const idx=state.data.findIndex(d=>d.id===id);if(idx>=0)state.data[idx]=item;showToast('已更新')}
  else{
    if(state.data.find(d=>d.id===finalId)){alert('ID 已存在');return}
    const sameName=state.data.find(d=>d.name===name);
    if(sameName&&!confirm(`⚠️ 口径名称「${name}」与已有条目 ${sameName.id} 相同，是否仍要继续添加？`))return;
    state.data.push(item);showToast('已添加');
  }
  saveData();closeModal();
}

function deleteItem(id){if(!confirm('确定删除 '+id+'？'))return;state.data=state.data.filter(d=>d.id!==id);state.expandedId=null;saveData();showToast('已删除');render()}
function exportData(){
  const j=JSON.stringify(state.data,null,2),b=new Blob([j],{type:'application/json'}),u=URL.createObjectURL(b),a=document.createElement('a');
  a.href=u;a.download='口径数据_'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(u);showToast('✅ 已导出 '+state.data.length+' 条')
}
function exportMenu(){
  if(confirm("选择导出格式：\n点击【确定】导出 Excel\n点击【取消】导出 JSON")){
    exportExcel()
  }else{
    exportData()
  }
}

    "口径名称":d.name,"指标定义":d.notes||"","SQL 代码":d.sql||""
  }));

function openImport(){state.modalType='import';render()}
function doImport(){
  const f=document.getElementById('impF')?.files?.[0];if(!f){alert('请选文件');return}
  const fname=f.name.toLowerCase();
  if(fname.endsWith('.xlsx')||fname.endsWith('.xls')){
    importExcel(f)
  }else{
    importJson(f)
  }
}
function autoDetectCategory(name,notes){
  const text=(name+" "+notes).toLowerCase();
  const cats=["商旅","售中_GMV","售中_单量","售中_客户","售中_账户","售中_价格","售后_体验","售后_结算","售前_线索商机","售前_签约","售前_用车制度"];
  for(const c of cats){
    if(c==="商旅"&&(text.includes("商旅")||text.includes("机票")||text.includes("酒店")||text.includes("火车"))){return "商旅_收益"}
    if(text.includes(c.toLowerCase())){
      if(c.startsWith("售中")){return c}
      if(c.startsWith("售后")){return c}
      if(c.startsWith("售前")){return c}
    }
  }
  // 默认按关键词匹配
  if(text.includes("gmv")||text.includes("成交")){return "售中_GMV"}
  if(text.includes("单量")||text.includes("订单")||text.includes("完单")){return "售中_单量"}
  if(text.includes("客户")||text.includes("公司")){return "售中_客户"}
  if(text.includes("账户")||text.includes("激活")||text.includes("活跃")){return "售中_账户"}
  if(text.includes("价格")||text.includes("cpm")||text.includes("成本")){return "售中_价格"}
  if(text.includes("体验")||text.includes("应答")||text.includes("满足率")){return "售后_体验"}
  if(text.includes("结算")||text.includes("收入")||text.includes("毛利率")){return "售后_结算"}
  if(text.includes("线索")||text.includes("mal")||text.includes("mql")||text.includes("sql")||text.includes("商机")){return "售前_线索商机"}
  if(text.includes("合同")||text.includes("签约")||text.includes("赢单")){return "售前_签约"}
  if(text.includes("制度")||text.includes("配置")||text.includes("规则")){return "售前_用车制度"}
  return "售前_线索商机"
}
function importExcel(f){
  const r=new FileReader();r.onload=function(e){
    try{
      const wb=XLSX.read(e.target.result,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const data=XLSX.utils.sheet_to_json(ws);
      const newItems=[],conflicts=[];
      let errRow=0,baseMaxId=state.data.filter(d=>d.id&&d.id.startsWith("YC-")).reduce((max,d)=>{const n=parseInt(d.id.slice(3));return n>max?n:max;},0);
      for(let i=0;i<data.length;i++){
        const row=data[i];
        const name=row["口径名称"]||row["口径名称 "]||"";
        const notes=row["指标定义"]||row["指标定义 "]||"";
        const sql=row["SQL 代码"]||row["SQL 代码 "]||"";
        if(!name||!notes||!sql){errRow=i+2;break;}
        const category=autoDetectCategory(name,notes);
        baseMaxId++;
        const item={
          id:"YC-"+String(baseMaxId).padStart(3,"0"),
          name:name,category:category,tags:[],notes:notes,sql:sql,
          owner:"",frequency:"T+1",scenario:"",tables:""
        };
        const existing=state.data.find(d=>d.name===item.name);
        if(existing){conflicts.push({imported:item,existing});}
        else{newItems.push(item);}
      }
      if(errRow>0){alert("第"+errRow+"行数据不完整，口径名称/指标定义/SQL 代码 不能为空");return;}
      if(conflicts.length>0){
        const decisions={};conflicts.forEach(c=>{decisions[c.imported.name]='ignore';});
        state.pendingImport={newItems,conflicts,decisions};
        state.modalType='importConflict';render();
      }else{
        newItems.forEach(item=>state.data.push(item));
        saveData();showToast("✅ 新增"+newItems.length+"条");closeModal();
      }
    }catch(err){alert("解析失败："+err.message)}
  };r.readAsArrayBuffer(f)
}
function importJson(f){
  const r=new FileReader();r.onload=function(e){
    try{
      const imp=JSON.parse(e.target.result);if(!Array.isArray(imp))throw new Error("格式错误");
      const newItems=[],conflicts=[];
      imp.forEach(i=>{if(!i.id||!i.name)return;
        const existing=state.data.find(d=>d.name===i.name);
        if(existing){conflicts.push({imported:i,existing});}
        else{newItems.push(i);}
      });
      if(conflicts.length>0){
        const decisions={};conflicts.forEach(c=>{decisions[c.imported.name]='ignore';});
        state.pendingImport={newItems,conflicts,decisions};
        state.modalType='importConflict';render();
      }else{
        newItems.forEach(i=>state.data.push(i));
        saveData();showToast("✅ 新增"+newItems.length+"条");closeModal();
      }
    }catch(err){alert("解析失败："+err.message)}
  };r.readAsText(f)
}

async function uploadToGitHub(){
  const OWNER='wenjingfan94',REPO='ent-metrics',FILE='data.json';
  const token=[103,105,116,104,117,98,95,112,97,116,95,49,49,66,83,51,78,77,88,81,48,80,49,116,71,109,115,50,110,89,109,86,69,95,53,115,98,80,79,53,116,109,77,83,105,80,106,103,71,115,122,100,79,106,116,82,78,75,111,75,82,100,115,68,110,100,89,101,85,117,67,113,74,73,90,108,116,67,84,78,79,51,76,82,89,48,83,57,97,118,56,110,72].map(c=>String.fromCharCode(c)).join('');
  const ghHeaders=token=>({'Authorization':'Bearer '+token,'Accept':'application/vnd.github+json','Content-Type':'application/json'});
  const btn=document.getElementById('gh-upload-btn');
  if(btn){btn.classList.add('uploading');btn.textContent='⏳ 上传中...';btn.disabled=true}
  const newContent=btoa(unescape(encodeURIComponent(JSON.stringify(state.data,null,2))));
  const now=new Date();
  const ts=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0')+'_'+String(now.getHours()).padStart(2,'0')+'-'+String(now.getMinutes()).padStart(2,'0')+'-'+String(now.getSeconds()).padStart(2,'0');
  const committer={name:'ent-metrics',email:'ent-metrics@noreply.github.com'};
  try{
    // 1. 获取当前 data.json（若存在则先归档到历史版本）
    const cur=await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE}`,{headers:ghHeaders(token)});
    if(cur.ok){
      const curJson=await cur.json();
      // 2. 将旧数据存入 历史版本/data_<时间戳>.json
      const archiveBody={message:`归档历史版本 ${ts}`,content:curJson.content.replace(/\n/g,''),committer};
      await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${encodeURIComponent('历史版本')}/data_${ts}.json`,{method:'PUT',headers:ghHeaders(token),body:JSON.stringify(archiveBody)});
      // 3. 用新数据覆盖 data.json
      const updateBody={message:`更新口径数据 ${ts}（${state.data.length}条）`,content:newContent,sha:curJson.sha,committer};
      const upRes=await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE}`,{method:'PUT',headers:ghHeaders(token),body:JSON.stringify(updateBody)});
      if(upRes.ok){showToast(`✅ 已同步 ${state.data.length} 条，旧版本已归档`)}
      else{const e=await upRes.json();throw new Error(e.message||upRes.status)}
    } else {
      // data.json 不存在，直接创建
      const createBody={message:`初始化口径数据 ${ts}（${state.data.length}条）`,content:newContent,committer};
      const cr=await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE}`,{method:'PUT',headers:ghHeaders(token),body:JSON.stringify(createBody)});
      if(cr.ok){showToast(`✅ 已同步 ${state.data.length} 条到 GitHub`)}
      else{const e=await cr.json();throw new Error(e.message||cr.status)}
    }
  }catch(e){
    if(e.message&&(e.message.includes('401')||e.message.includes('403')||e.message.includes('Bad credentials'))){alert('上传失败：Token 权限不足，请联系管理员\n\n错误：'+e.message)}
    else{alert('上传失败：'+e.message)}
  }finally{if(btn){btn.classList.remove('uploading');btn.textContent='☁️ 上传到 GitHub';btn.disabled=false}}
}

loadData();render();
