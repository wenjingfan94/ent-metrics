<style>
:root {
  --bg-root: #0F1117;
  --bg-panel: #171921;

  --bg-card-hover: #252840;
  --bg-input: #252840;
  --bg-code: #0D0F17;
  --border: #2A2D3E;
  --border-focus: #6C5CE7;
  --text-primary: #E8E9F0;
  --text-secondary: #8B8FA3;
  --text-muted: #575B73;
  --accent: #6C5CE7;
  --accent-glow: rgba(108,92,231,0.25);
  --accent-hover: #7C6FF7;
  --green: #00D68F;
  --orange: #FDAB3D;
  --red: #FF6B6B;
  --blue: #4ECDC4;
  --pink: #FD79A8;
  --radius: 10px;
  --radius-lg: 14px;
  --font-body: 'Noto Sans SC', -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', 'Cascadia Code', monospace;
  --scale: 1.15;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-size:var(--scale)}
body{font-family:var(--font-body);background:var(--bg-root);color:var(--text-primary);font-size:calc(14px * var(--scale));transform-origin:top left}

.app{display:flex;height:100vh}
.sidebar{width:290px;min-width:290px;background:var(--bg-panel);border-right:1px solid var(--border);display:flex;flex-direction:column}
#sidebar-inner{display:flex;flex-direction:column;height:100%;overflow:hidden}
.sidebar-header{padding:24px 18px 16px;border-bottom:1px solid var(--border)}
.sidebar-header h1{font-size:15px;font-weight:900;background:linear-gradient(135deg,#6C5CE7,#a29bfe);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.sidebar-header .subtitle{font-size:11px;color:var(--text-muted)}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 8px}
.sidebar-nav::-webkit-scrollbar{width:5px}
.sidebar-nav::-webkit-scrollbar-thumb{background:var(--border);border-radius:5px}
.nav-section-title{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.5px;padding:10px 10px 4px;user-select:none}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;font-size:12px;color:var(--text-secondary);cursor:pointer;transition:all .15s;user-select:none;font-weight:500}
.nav-item:hover{background:var(--bg-card);color:var(--text-primary)}
.nav-item.active{background:var(--accent-glow);color:#A29BFE;font-weight:700}
.nav-item .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.nav-item .count{margin-left:auto;font-size:10px;color:var(--text-muted);background:var(--bg-card);padding:1px 6px;border-radius:10px;font-weight:600}
.sidebar-footer{padding:12px;border-top:1px solid var(--border);display:flex;gap:5px}
.sidebar-footer button{flex:1;padding:7px 0;border-radius:7px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-secondary);font-size:11px;font-weight:600;cursor:pointer;font-family:var(--font-body);transition:all .15s}
.sidebar-footer button:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-glow)}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:52px;min-height:52px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:10px}
.search-box{flex:1;max-width:560px;display:flex;align-items:center;gap:8px;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius);padding:0 12px;height:36px;transition:border-color .2s}
.search-box:focus-within{border-color:var(--border-focus);box-shadow:0 0 0 3px var(--accent-glow)}
.search-box input{flex:1;background:none;border:none;outline:none;color:var(--text-primary);font-size:13px;font-family:var(--font-body)}
.search-box input::placeholder{color:var(--text-muted)}
.topbar-actions{margin-left:auto;display:flex;gap:8px}
.btn{padding:7px 14px;border-radius:7px;border:none;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font-body);transition:all .15s;display:flex;align-items:center;gap:5px}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-hover);transform:translateY(-1px)}
.btn-ghost{background:transparent;color:var(--text-secondary);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--text-secondary);color:var(--text-primary)}
.btn-danger{background:rgba(255,107,107,.1);color:var(--red);border:1px solid transparent}
.btn-danger:hover{border-color:var(--red)}
.btn-github{background:#24292e;color:#e8e9f0;border:1px solid #444}
.btn-github:hover{background:#2f363d;border-color:#6C5CE7;transform:translateY(-1px)}
.btn-github.uploading{opacity:.7;cursor:not-allowed}

.content{flex:1;overflow-y:auto;padding:20px}
.content::-webkit-scrollbar{width:5px}
.content::-webkit-scrollbar-thumb{background:var(--border);border-radius:5px}
.stats-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.stat-chip{font-size:11px;color:var(--text-muted);background:var(--bg-card);padding:4px 10px;border-radius:20px;font-weight:500}
.stat-chip b{color:var(--text-secondary);font-weight:700}

.sql-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:10px;transition:all .2s;overflow:hidden}
.sql-card:hover{border-color:#3A3D52}
.sql-card.expanded{border-color:var(--accent);box-shadow:0 4px 20px var(--accent-glow)}
.card-header{padding:12px 16px;cursor:pointer;display:flex;align-items:center;gap:10px;user-select:none}
.card-id{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;flex-shrink:0;font-family:var(--font-mono)}
.card-name{font-size:13px;font-weight:700;flex:1;color:var(--text-primary)}
.card-owner{font-size:11px;color:var(--text-muted);flex-shrink:0;font-family:var(--font-mono)}
.card-arrow{font-size:10px;color:var(--text-muted);transition:transform .2s;flex-shrink:0}
.sql-card.expanded .card-arrow{transform:rotate(180deg)}
.card-body{padding:0 16px 16px}
.card-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px}
.tag{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--bg-input);color:var(--text-muted);font-weight:500}
.card-def{font-size:12px;padding:10px 12px;border-radius:8px;margin-bottom:12px;border-left:3px solid var(--orange);background:rgba(253,171,61,.08);color:var(--orange);line-height:1.7}
.code-block{position:relative;background:var(--bg-code);border-radius:8px;border:1px solid var(--border);overflow:hidden}
.code-block pre{padding:14px;margin:0;overflow-x:auto;font-family:var(--font-mono);font-size:13px;line-height:1.65;color:#ABB2BF;white-space:pre;tab-size:4}
.copy-btn{position:absolute;top:7px;right:7px;padding:4px 10px;border-radius:5px;background:var(--bg-card);border:1px solid var(--border);color:var(--text-muted);font-size:11px;font-weight:600;cursor:pointer;font-family:var(--font-body);transition:all .15s;z-index:2}
.copy-btn:hover{border-color:var(--accent);color:var(--accent)}
.copy-btn.copied{background:var(--green);color:#fff;border-color:var(--green)}
.card-actions{display:flex;gap:5px;margin-top:10px;justify-content:flex-end}
.kw{color:#C678DD;font-weight:600}.str{color:#98C379}.cmt{color:#5C6370;font-style:italic}.num{color:#D19A66}.var{color:#E06C75;font-weight:600}.fn{color:#61AFEF}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px);animation:fadeIn .15s ease}
.modal{background:var(--bg-panel);border:1px solid var(--border);border-radius:var(--radius-lg);width:800px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.5);animation:slideUp .2s ease}
.modal-header{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-header h2{font-size:15px;font-weight:700}
.modal-close{width:28px;height:28px;border-radius:7px;background:var(--bg-card);border:none;color:var(--text-muted);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.modal-body{padding:22px}
.modal-footer{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:11px;font-weight:700;color:var(--text-secondary);margin-bottom:5px}
.form-input,.form-select,.form-textarea{width:100%;padding:9px 12px;background:var(--bg-input);border:1px solid var(--border);border-radius:7px;color:var(--text-primary);font-size:13px;font-family:var(--font-body);outline:none;transition:border-color .2s}
.form-input:focus,.form-textarea:focus{border-color:var(--border-focus);box-shadow:0 0 0 3px var(--accent-glow)}
.form-textarea{min-height:180px;font-family:var(--font-mono);font-size:12px;line-height:1.7;resize:vertical}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.empty-state{text-align:center;padding:50px 20px;color:var(--text-muted)}
.empty-state .icon{font-size:42px;margin-bottom:14px;opacity:.5}
.empty-state h3{font-size:15px;color:var(--text-secondary);margin-bottom:6px}
.toast{position:fixed;bottom:20px;right:20px;background:var(--green);color:#fff;padding:9px 18px;border-radius:8px;font-size:13px;font-weight:600;animation:slideUp .2s ease,fadeOut .3s ease 1.7s forwards;z-index:2000}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeOut{to{opacity:0;transform:translateY(-10px)}}
@media(max-width:768px){.sidebar{display:none}.form-row{grid-template-columns:1fr}}
</style>
</head>

                WHEN manage_type = 0 THEN '企业支付'
                WHEN manage_type = 1 THEN '个人垫付'
                ELSE manage_type
            END                         AS manage_type
            , CASE  -- 来源：1 通用规则 2 行前审批 3 差旅

                WHEN source = 3 THEN '差旅'
                ELSE source
            END                         AS source
            , CASE  -- 出行类型:1 自用,2 代订,3 自用+代订

            AND source = 1
            AND COALESCE(id, 0) > 0

                    , CONCAT('节假日时段 ', GET_JSON_OBJECT(rules, '$[0].time_public.holiday.start'), '-', GET_JSON_OBJECT(rules, '$[0].time_public.holiday.end')) AS holiday_limit

LEFT JOIN (

                    , GET_JSON_OBJECT(rules, '$[0].car_pool.range') AS car_pool_range
                    , GET_JSON_OBJECT(rules, '$[0].open_status') AS open_status

                    , CONCAT('工作日时段 ', GET_JSON_OBJECT(rules, '$[0].time_public.work.start'), '-', GET_JSON_OBJECT(rules, '$[0].time_public.work.end')) AS workday_limit
                    , CONCAT('节假日时段 ', GET_JSON_OBJECT(rules, '$[0].time_public.holiday.start'), '-', GET_JSON_OBJECT(rules, '$[0].time_public.holiday.end')) AS holiday_limit
                    , start_time
                    , high_components
                    , travel_type  -- 出行类型:1 自用,2 代订,3 自用+代订
                    , high_components  -- 高级组件
                    , ROW_NUMBER() OVER(PARTITION BY institution_id ORDER BY update_time DESC) AS rk_inst
            FROM   es_dw.ods_binlog_es_institution_snapshot_d_whole
            WHERE  CONCAT_WS('-', YEAR, MONTH, DAY) = DATE_SUB(CURRENT_DATE, 1)
                    AND company_id = '\${company_id}'
                    AND source = 1  -- 来源：1 通用规则 2 行前审批 3 差旅
                    AND status = 0  -- 状态，0：正常，1：停用，2：删除，3：已过期
                    AND system_rule_etl_delete_flag = 0  -- 删除记录标识,0-正常记录,1-删除记录
        ) AS tblInnerSnap
        WHERE  rk_inst = 1  -- 去重
    ) tblSnapshot
    LATERAL VIEW EXPLODE(GET_JSON_ARRAY(GET_JSON_OBJECT(rules,'$[0].position_start'))) tblTmp AS data
    WHERE  tblTmp.data IS NOT NULL
    GROUP BY tblSnapshot.institution_id

            , MAX(CASE WHEN car_name IN('滴滴特快''第三方特快') THEN 1 ELSE 0 END) AS is_aplus_allowed

            , MAX(CASE WHEN car_name IN('舒适专车''六座商务专车''行政专车') THEN 1 ELSE 0 END) AS is_premium_allowed

    id: "YC-026",
    name: `财务用车GMV`,
    category: "售中_GMV",
    tags: ["因私", "GMV"],
    scenario: "售中 GMV",
    tables: ``,
    frequency: "T+1",
    owner: "feifeiliu",
    updated: "",
    notes: `因私出行券GMV + 用车GMV。`,
    sql: `SELECT tblESGOrder.finish_month
        , tblESGOrder.total_car_gmv + COALESCE(tblCoupon.coupon_gmv, 0) AS finance_gmv     -- 财务用车GMV
FROM (   
    SELECT tblOrder.finish_month
            , SUM(tblOrder.car_gmv) AS total_car_gmv     -- 用车GMV
    FROM (
        SELECT company_id
                , SUBSTR(finish_time, 1, 7) AS finish_month
                , SUM(total_price) AS car_gmv
        FROM   es_dw.dwd_ent_trd_travel_order_df
        WHERE  dt = DATE_SUB(CURRENT_DATE, 1)
                AND SUBSTR(finish_time, 1, 10) between '\${date_begin}' and '\${date_end}' 
                AND pay_type IN (0, 1, 2)
                AND status NOT IN (1)
        GROUP BY company_id
                  , SUBSTR(finish_time, 1, 7) 
    ) AS tblOrder       -- 企业级订单全量，算用车GMV 

    JOIN (
        SELECT company_id
                , dt_belong
        FROM   es_dw.dim_ent_user_company_belong  -- 流失前归属表
        WHERE  dt = DATE_SUB(CURRENT_DATE, 1)
                AND dc_l2_department NOT IN ('B2B2C', '！神访')
                AND is_curr_belong = 1    -- 标识是否销售易上的客户归属 1是 0否, 否一般是合作打单或是业绩归属其他团队的情况
    ) AS tblTeams 
    ON tblOrder.company_id = tblTeams.company_id
        AND tblOrder.finish_month = tblTeams.dt_belong
    GROUP BY tblOrder.finish_month
) AS tblESGOrder

LEFT JOIN (
    SELECT SUBSTR(tblCOrder.finish_time, 1, 7) AS finish_month
            , sum(tblCOrder.gmv) AS coupon_gmv      -- 因私出行券GMV
    FROM (
        SELECT order_id
                , SUBSTR(end_charge_time, 1, 10) AS finish_time 
                ,  gmv_amt / 100 AS gmv    --（单位：分）跟财务口径保持一致；
        FROM    decdm.dwd_gflt_ord_order_base_di
        WHERE   dt BETWEEN '\${date_begin}' AND '\${date_end}'
                 AND is_td_finish_flag = 1
    ) AS tblCOrder

    JOIN (
        SELECT SUBSTR(order_id, 2, LENGTH(order_id) - 1) AS order_id
        FROM   es_test.dwd_sale_coupon_consumption_ent_di
        WHERE  concat_ws('-',year,month,day) between '\${date_begin}' and '\${date_end}'
                AND sell_flag = '售卖券'
    ) AS tblCouponOrder 
    ON tblCOrder.order_id = tblCouponOrder.order_id
    GROUP BY SUBSTR(tblCOrder.finish_time, 1, 7)
) AS tblCoupon 
ON tblESGOrder.finish_month = tblCoupon.finish_month`

            AND SUBSTR(finish_time, 1, 4) = YEAR(CURRENT_DATE)
            AND pay_type IN (0, 1, 2)
            AND status NOT IN (1, 4)
    GROUP BY company_id
              , company_name
              , SUBSTR(finish_time, 1, 7) 
) AS tblOrder

JOIN (
    SELECT company_id
            , dt_belong
    FROM   es_dw.dim_ent_user_company_belong  -- 流失前归属表
    WHERE  dt = DATE_SUB(CURRENT_DATE, 1)

) AS tblTeams 
ON tblOrder.company_id = tblTeams.company_id
    AND tblOrder.finish_month = tblTeams.dt_belong

LEFT JOIN (

    SELECT TRANSLATE(COALESCE(clear_invoice_title, invoice_title), '()', '（）') AS company_name
            , SUBSTR(make_invoice_time, 1, 7) AS finish_month
            , COUNT(DISTINCT order_id) AS total_cnt
    FROM   es_dw.dwd_invoice_order_scene_day
    WHERE  YEAR = YEAR(CURRENT_DATE)
            AND SUBSTR(make_invoice_time, 1, 4) = YEAR(CURRENT_DATE)
            AND COALESCE(gmv_total_fee, 0) > 0 -- 完单与开票相距550天以上的, gmv_total_fee为空/0
            AND LENGTH(TRANSLATE(COALESCE(clear_invoice_title, invoice_title), '()', '（）')) > 3

    GROUP BY TRANSLATE(COALESCE(clear_invoice_title, invoice_title), '()', '（）')
              , SUBSTR(make_invoice_time, 1, 7)
) AS tblInvoice 
ON tblInvoice.company_name = tblOrder.company_name
    AND tblInvoice.finish_month = tblOrder.finish_month

            , tblDistance.normal_distance

    ON tblOrder.order_id = tblExtend.order_id

        WHERE  dt = DATE_SUB(current_date, 1)
                AND TO_DATE(travel_last_activate_date) > '1970-10-01'

    -- 商旅YOY表
    t_cross
    AS (
        SELECT company_id
                , company_name
                , CASE
                    WHEN source_catogary = '2.1.1.客户来源-交叉新-CSM一部-在线交通' THEN '商机打开给在线交通'
                    WHEN source_catogary = '2.1.2.客户来源-交叉新-CSM一部-网约出行' THEN '商机打开给网约出行'
                    WHEN source_catogary = '2.1.3.客户来源-交叉新-CSM一部'      THEN 'CSM一部自留'
                END AS '交叉渗透（不含AE）项目客户来源'
                , CASE

                    WHEN NVL(tblTyActivate.travel_last_activate_date, '1970-01-01') > '1970-01-01' AND NVL(t_biz.revised_cf_activate_date, '1970-01-01') = '1970-01-01' THEN - 999

        , COUNT(DISTINCT CASE WHEN '是否以用车为主体分析' = '是' AND YEAR('用车最近激活日期') = 2025 THEN '公司id'

                    WHEN NVL(tblTyActivate.travel_last_activate_date, '1970-01-01') > '1970-01-01' AND NVL(t_biz.revised_cf_activate_date, '1970-01-01') > '1970-01-01' AND MONTHS_BETWEEN(tblTyActivate.travel_act_month, t_biz.revised_cf_month) < - 3 AND YEAR(tblTyActivate.travel_last_activate_date) < YEAR(t_biz.revised_cf_activate_date) THEN '是'
                    ELSE '否'
                END                                           AS '​是否用车老客渗透商旅'
        FROM   t_com LEFT JOIN t_biz
                    ON t_com.company_id = t_biz.company_id
                LEFT JOIN tblTyActivate
                    ON t_com.company_id = tblTyActivate.company_id
                LEFT JOIN t_cross
                    ON t_com.company_id = t_cross.company_id
        WHERE  t_biz.company_id IS NOT NULL
                OR tblTyActivate.company_id IS NOT NULL
    )
SELECT t_ddo.stat_date
        , t_ddo.company_id
        , SUM(CASE WHEN '商旅客户来源' = '交叉渗透' THEN t_ddo.real_gmv / 100 ELSE 0 END) AS '交叉渗透客户商旅GMV（含AE）'
        , SUM(CASE WHEN '是否用车新客渗透商旅' = '是' THEN t_ddo.real_gmv / 100 ELSE 0 END) AS '用车新客交叉渗透GMV（含AE）'
        , SUM(CASE WHEN '​是否用车老客渗透商旅' = '是' THEN t_ddo.real_gmv / 100 ELSE 0 END) AS '用车老客交叉渗透GMV（含AE）'
        , SUM(CASE WHEN '商旅客户来源' = '一站式激活' THEN t_ddo.real_gmv / 100 ELSE 0 END) AS '一站式（同时）激活客户商旅GMV含AE）'
        , SUM(CASE WHEN '商旅客户来源' = '纯新' THEN t_ddo.real_gmv / 100 ELSE 0 END) AS '纯新商旅GMV（含AE）'
FROM   es_dw.app_ent_biz_ddo_merge_df AS t_ddo JOIN t_detail
            ON t_ddo.company_id = t_detail.'公司id'
WHERE  dt = DATE_SUB(CURRENT_DATE, 1)
        AND SUBSTR(stat_date, 1, 10) >= '2026-01-01'
        AND SUBSTR(stat_date, 1, 10) BETWEEN '\${start_date}' AND '\${end_date}'  -- 统计日期选择时间跨度
        AND company_id NOT IN (1125917396247053, 1125917619516646)  -- 排除异常客户
        AND  ! (is_didi = 1 AND is_personal = 0)  -- 非滴滴因公
GROUP BY t_ddo.stat_date
        , t_ddo.company_id

;`

        , CASE WHEN t_oppt.is_leads_ft = 1 THEN 1 ELSE 0 END    AS '是否公司供给'
        , CASE WHEN t_oppt.is_leads_ft = 0 THEN 1 ELSE 0 END    AS '是否销售自拓'
        , t_oppt.is_leads_center                                AS '是否线索中心产出'
        , t_oppt.is_self_receive                                AS '是否自充值'

        , t_oppt.l2_department                                  AS '商机所属二级部门'

        , t_oppt.l4_department                                  AS '商机所属四级部门'
        , t_oppt.owner_name                                     AS '商机所有人'
        , t_oppt.potential_monthly_gmv AS '商旅月潜力GMV（滴滴份额）'

LEFT JOIN (

                , win_rate
                , l1_department
                , l2_department
                , l3_department
                , l4_department
                , owner_name
                , ROW_NUMBER() OVER(PARTITION BY company_id ORDER BY is_contribute_receive DESC, win_rate DESC, SUBSTR (TO_DATE (TRANSLATE (create_time, '/', '-' ) ), 1, 10 ) DESC) AS rk
        FROM
            es_dw.dwm_ent_user_oppt_info_view_df
        WHERE
            dt = date_sub(current_date, 1)
            AND entity_type_name = '商旅拉新商机' --  and company_id = 1125919706075167
            AND company_id <> ''
      ) t_oppt_temp
WHERE
    rk = 1
) t_oppt ON t_biz.company_id = t_oppt.company_id`

    stat_date

            when order_source = 3 then 'openapi'
            when source_channel between 10000 and 19999 or source_channel in (200000,200021,200030,200031,200032,200033,200040,200041,200050,200060,200061,200070) then 'H5'
            when source_channel in (200010,200020,200022,300000) then '滴滴企业版APP'
            when source_channel = 200080 then '商旅PC端'

    from es_test.biz_total_order_list

        and company_id not in ('1125917396247053','1125917619516646') 
)

company_id 
,company_name
,biz_type
,on_off_line
,stat_type
,case when h5_ord_cnt >0 and app_ord_cnt >0 then 'h5+app'
    when app_ord_cnt >0 then 'app' 
    when h5_ord_cnt >0 then 'h5'
    else null end as source_tag  --主要对接方式

,if(h5_ord_cnt >0 ,1,0) as h5_tag --是否对接H5

(
    select 
        company_id 
        ,company_name
        ,biz_type
        ,on_off_line
        ,stat_type
        ,count(distinct order_id) as ord_cnt 
        ,count(distinct if(source_channel_type = '手工单',order_id,null)) as manual_ord_cnt
        ,count(distinct if(source_channel_type = 'openapi',order_id,null)) as api_ord_cnt

        ,count(distinct if(source_channel_type = '商旅PC端',order_id,null)) as pc_ord_cnt
    from ord
    group by 1,2,3,4,5
)t1`

  {
    id: "SL-043",
    name: `差旅单明细`,
    category: "商旅_账户转化",
    tags: ["是否差旅单", "是否机酒火差旅单", "是否机酒火差旅单转化", "机酒火差旅单转化数", "机酒火差旅单转化率"],
    scenario: "售后_账户转化",
    tables: "",
    frequency: "T+1",
    owner: "weimeifang",
    updated: "",
    notes: `滴滴差旅单唯一标识；客户差旅单唯一标识；有酒店预订权限&申请通过的差旅单；有机票或者火车票预订权限&申请通过的差旅单；有机票预订权限&申请通过的差旅单；有火车票预订权限&申请通过的差旅单；一个差旅单中只要有机票、酒店、火车票任一品类预订成功即算该差旅单转化；差旅单转化数/差旅单数`,
    sql: `select 
            substr(start_valid_time,1,7) as '差旅单申请月'
            ,requisition_id
            ,new_requisition_id 
            ,company_id 
            ,company_name
            ,1 as '是否差旅单'
            ,case when is_res_hotel_new = 1 then '是' else '否' end as '是否酒店差旅单'
            ,case when is_res_flight = 1 then '是' else '否' end as '是否机票差旅单'
            ,case when is_res_train = 1 then '是' else '否' end as '是否火车票差旅单'
            ,case when is_res_flight+is_res_train> 0 then '是' else '否' end as '是否机火差旅单'
            ,case when is_res_hotel_new = 1 and htl_night_cnt > 0 then 1 else 0 end as '是否酒店差旅单转化'
            ,case when is_res_flight = 1 and fl_tkt_cnt > 0 then 1 else 0 end as '是否机票差旅单转化'
            ,case when is_res_train = 1 and tr_tkt_cnt > 0 then 1 else 0 end as '是否火车票差旅单转化'
            ,case when is_res_flight+is_res_train> 0 and fl_tkt_cnt+tr_tkt_cnt > 0 then 1 else 0 end as '是否机火差旅单转化'
            ,count(distinct new_requisition_id) as '差旅单数' 
            ,count(distinct case when is_res_hotel_new = 1 then new_requisition_id else null end) as '酒店差旅单数'
            ,count(distinct case when is_res_flight = 1 or is_res_train = 1 then new_requisition_id else null end) as '机火差旅单数'
            ,count(distinct case when is_res_flight = 1 then new_requisition_id else null end) as '机票差旅单数'
            ,count(distinct case when is_res_train = 1 then new_requisition_id else null end) as '火车票差旅单数'
            ,count(distinct case when fl_tkt_cnt > 0 or tr_tkt_cnt > 0 or htl_night_cnt > 0 then new_requisition_id else null end) as '差旅单转化数'
            ,count(distinct case when is_res_hotel_new = 1 and htl_night_cnt > 0 then new_requisition_id else null end) as '酒店差旅单转化数'
            ,count(distinct case when (is_res_flight = 1 or is_res_train =1) and (fl_tkt_cnt > 0 or tr_tkt_cnt>0) then new_requisition_id else null end) as '机火差旅单转化数'
            ,count(distinct case when is_res_flight = 1 and fl_tkt_cnt > 0 then new_requisition_id else null end) as '机票差旅单转化数'
            ,count(distinct case when is_res_train =1 and tr_tkt_cnt > 0 then new_requisition_id else null end) as '火车票差旅单转化数'
            ,count(distinct case when fl_tkt_cnt > 0 or tr_tkt_cnt > 0 or htl_night_cnt > 0 then new_requisition_id else null end)/count(distinct new_requisition_id) as '差旅单转化率'
            ,count(distinct case when is_res_hotel_new = 1 and htl_night_cnt > 0 then new_requisition_id else null end)/count(distinct case when is_res_hotel_new = 1 then new_requisition_id else null end) as '酒店差旅单转化率'
            ,count(distinct case when (is_res_flight = 1 or is_res_train =1) and (fl_tkt_cnt > 0 or tr_tkt_cnt>0) then new_requisition_id else null end)/count(distinct case when is_res_flight = 1 or is_res_train = 1 then new_requisition_id else null end) as '机火差旅单转化率'
            ,count(distinct case when is_res_flight = 1 and fl_tkt_cnt > 0 then new_requisition_id else null end)/count(distinct case when is_res_flight = 1 then new_requisition_id else null end) as '机票差旅单转化率'
            ,count(distinct case when is_res_train =1 and tr_tkt_cnt > 0 then new_requisition_id else null end)/count(distinct case when is_res_train = 1 then new_requisition_id else null end) as '火车票差旅单转化率'
        from 
        (
            select 
                *
                ,case when is_res_hotel=1 and res_is_no_hotel_need=0 then 1 else 0 end as is_res_hotel_new --是否酒店差旅单
                ,case when out_trip_id <>'' and out_trip_id is not null then out_trip_id else requisition_id end as new_requisition_id --新差旅单id,根据外部申请单id去重
            from es_test.biz_requisition_transform
            where dt = date_sub(current_date,1)
            and substr(start_valid_time,1,10) >= date_sub(current_date,3)--可选日期
            and (is_res_flight=1 or is_res_train=1 or is_res_hotel=1)
            and company_id<>4441232560273757550
        )t 
        group by 
            substr(start_valid_time,1,7)
            ,requisition_id
            ,new_requisition_id 
            ,company_id 
            ,company_name
            ,case when is_res_hotel_new = 1 then '是' else '否' end 
            ,case when is_res_flight = 1 then '是' else '否' end 
            ,case when is_res_train = 1 then '是' else '否' end 
            ,case when is_res_flight+is_res_train> 0 then '是' else '否' end
            ,case when is_res_hotel_new = 1 and htl_night_cnt > 0 then 1 else 0 end 
            ,case when is_res_flight = 1 and fl_tkt_cnt > 0 then 1 else 0 end 
            ,case when is_res_train = 1 and tr_tkt_cnt > 0 then 1 else 0 end
            ,case when is_res_flight+is_res_train> 0 and fl_tkt_cnt+tr_tkt_cnt > 0 then 1 else 0 end`

    name: `客户是否有差旅单`,
    category: "商旅_账户转化",
    tags: ["最早差旅单回传时间", "客户是否有酒店差旅单", "客户是否有机火差旅单", "客户是否有机票差旅单", "客户是否有火车票差旅单"],
    scenario: "售后_账户转化",
    tables: "",
    frequency: "T+1",
    owner: "weimeifang",
    updated: "",
    notes: `客户最早差旅单回传时间；近3个完整月客户是否有差旅单；近3个完整月客户是否有酒店差旅单；近3个完整月客户是否有机票或者火车票差旅单；近3个完整月客户是否有机票差旅单；近3个完整月客户是否有火车票差旅单`,
    sql: `select 
    t_biz.company_id 
    ,t_biz.company_name
    ,t_biz.revised_cf_activate_date
    ,'最早差旅单回传时间'
    ,case when '差旅单数'>0 then '是' else 0 end as '客户是否有差旅单'
    ,case when '酒店差旅单数'>0 then '是' else 0 end as '客户是否有酒店差旅单'
    ,case when '机票差旅单数'>0 then '是' else 0 end as '客户是否有机票差旅单'
    ,case when '火车票差旅单数'>0 then '是' else 0 end as '客户是有否火车票差旅单'
    ,nvl(t_req.'差旅单数',0) as '差旅单数' 
    ,nvl(t_req.'酒店差旅单数',0) as '酒店差旅单数'
    ,nvl(t_req.'机火差旅单数',0) as '机火差旅单数'
    ,nvl(t_req.'机票差旅单数',0) as '机票差旅单数'
    ,nvl(t_req.'火车票差旅单数',0) as '火车票差旅单数'
    ,nvl(t_req.'差旅单转化数',0) as '差旅单转化数'
    ,nvl(t_req.'酒店差旅单转化数',0) as '酒店差旅单转化数'
    ,nvl(t_req.'机火差旅单转化数',0) as '机火差旅单转化数'
    ,nvl(t_req.'机票差旅单转化数',0) as '机票差旅单转化数'
    ,nvl(t_req.'火车票差旅单转化数',0) as '火车票差旅单转化数'
    ,nvl(t_req.'差旅单转化率',0) as '差旅单转化率'
    ,nvl(t_req.'酒店差旅单转化率',0) as '酒店差旅单转化率'
    ,nvl(t_req.'机火差旅单转化率',0) as '机火差旅单转化率'
    ,nvl(t_req.'机票差旅单转化率',0) as '机票差旅单转化率'
    ,nvl(t_req.'火车票差旅单转化率',0) as '火车票差旅单转化率'

from 
(
    select 
        company_id 
        ,company_name
        ,revised_cf_activate_date
    from es_dw.dwm_ent_user_company_biz_fl_df
    where dt = date_sub(current_date,1)
    and to_date(revised_cf_activate_date)>'1970-01-01' -- 通常看商旅因公激活客户
)t_biz
left join 
(
    select 
        company_id 
        ,company_name
        ,min(start_valid_time) as '最早差旅单回传时间'
        ,count(distinct case when is_near3months = 1 then new_requisition_id else null end) as '差旅单数' 
        ,count(distinct case when is_near3months = 1 and is_res_hotel_new = 1 then new_requisition_id else null end) as '酒店差旅单数'
        ,count(distinct case when is_near3months = 1 and is_res_flight = 1 or is_res_train = 1 then new_requisition_id else null end) as '机火差旅单数'
        ,count(distinct case when is_near3months = 1 and is_res_flight = 1 then new_requisition_id else null end) as '机票差旅单数'
        ,count(distinct case when is_near3months = 1 and is_res_train = 1 then new_requisition_id else null end) as '火车票差旅单数'
        ,count(distinct case when is_near3months = 1 and fl_tkt_cnt > 0 or tr_tkt_cnt > 0 or htl_night_cnt > 0 then new_requisition_id else null end) as '差旅单转化数'
        ,count(distinct case when is_near3months = 1 and is_res_hotel_new = 1 and htl_night_cnt > 0 then new_requisition_id else null end) as '酒店差旅单转化数'
        ,count(distinct case when is_near3months = 1 and (is_res_flight = 1 or is_res_train =1) and (fl_tkt_cnt > 0 or tr_tkt_cnt>0) then new_requisition_id else null end) as '机火差旅单转化数'
        ,count(distinct case when is_near3months = 1 and is_res_flight = 1 and fl_tkt_cnt > 0 then new_requisition_id else null end) as '机票差旅单转化数'
        ,count(distinct case when is_near3months = 1 and is_res_train =1 and tr_tkt_cnt > 0 then new_requisition_id else null end) as '火车票差旅单转化数'
        ,count(distinct case when is_near3months = 1 and fl_tkt_cnt > 0 or tr_tkt_cnt > 0 or htl_night_cnt > 0 then new_requisition_id else null end)/count(distinct new_requisition_id) as '差旅单转化率'
        ,count(distinct case when is_near3months = 1 and is_res_hotel_new = 1 and htl_night_cnt > 0 then new_requisition_id else null end)/count(distinct case when is_res_hotel_new = 1 then new_requisition_id else null end) as '酒店差旅单转化率'
        ,count(distinct case when is_near3months = 1 and (is_res_flight = 1 or is_res_train =1) and (fl_tkt_cnt > 0 or tr_tkt_cnt>0) then new_requisition_id else null end)/count(distinct case when is_res_flight = 1 or is_res_train = 1 then new_requisition_id else null end) as '机火差旅单转化率'
        ,count(distinct case when is_near3months = 1 and is_res_flight = 1 and fl_tkt_cnt > 0 then new_requisition_id else null end)/count(distinct case when is_res_flight = 1 then new_requisition_id else null end) as '机票差旅单转化率'
        ,count(distinct case when is_near3months = 1 and is_res_train =1 and tr_tkt_cnt > 0 then new_requisition_id else null end)/count(distinct case when is_res_train = 1 then new_requisition_id else null end) as '火车票差旅单转化率'
    from 
    (
        select 
            *
            ,case when is_res_hotel=1 and res_is_no_hotel_need=0 then 1 else 0 end as is_res_hotel_new --是否酒店差旅单
            ,case when out_trip_id <>'' and out_trip_id is not null then out_trip_id else requisition_id end as new_requisition_id --新差旅单id,根据外部申请单id去重
            ,case when months_between(substr(current_date,1,7), substr(start_valid_time,1,7)) between 0 and 3 then 1 else 0 end as is_near3months -- 判断客户有没有差旅单主要看近3个完整月
        from es_test.biz_requisition_transform
        where dt = date_sub(current_date,1)
        -- and substr(start_valid_time,1,10) >= date_sub(current_date,90)--可选日期
        and (is_res_flight=1 or is_res_train=1 or is_res_hotel=1)
        and company_id<>4441232560273757550
    )t 
    group by 
        company_id 
        ,company_name
)t_req on t_biz.company_id =  t_req.company_id`
  },
  {
    id: "SL-045",
    name: `有差旅单商旅间夜票张占比`,
    category: "商旅_账户转化",
    tags: ["有差旅单酒店间夜占比", "有差旅单机火票张占比", "有差旅单机票票张占比", "有差旅单火车票票张占比"],
    scenario: "售后_账户转化",
    tables: "",
    frequency: "T+1",
    owner: "weimeifang",
    updated: "",
    notes: `限制国内线上因公订单：有差旅单商旅预订间夜票张数/总商旅预订间夜票张数；有差旅单酒店预订间夜数/总酒店预订间夜数；有差旅单机火预订票张数/总机火预订票张数；有差旅单机票预订订单数/总机票预订订单数；有差旅单火车票预订订单数/总火车票预订订单数`,
    sql: `--国内线上订单
with t_flight_ord as (
    
    select 
        substr(issue_time,1,7) as st_month
        ,'机票' as '品类',
        order_id,
        requisition_id,
        member_id,
        institution_id,
        company_id,
        company_name
        ,count(distinct case when ticket_type_name in ('首次出票','出票后退票') then ticket_id else null end) as tkt_nit_cnt
        ,sum(case when ticket_type_name in ('首次出票','出票后退票') then (user_cost+e_reserve_fee)/100 
            when ticket_type_name in ('改签','改签后退票') then (user_cost+e_change_fee)/100
            when to_date(refund_time)>'1970-01-01' then -user_refund_amount /100 else 0 end ) as real_gmv
    from es_dw.dwm_ent_trd_flight_dom_segment_df -- es_dw.dwm_ent_trd_flight_segment_df
    where
        dt = date_sub(current_date,1)
        and to_date(issue_time) between '2025-06-01' and '2025-08-31'      
        and is_test_company = 0
        and is_test_ord = 0
        and segment_status in (3, 5, 6, 7, 8, 10) 
        and is_personal=0
    group by substr(issue_time,1,7) ,
        order_id,
        requisition_id,
        member_id,
        institution_id,
        company_id,
        company_name

),
t_train_ord as(

    select 
        substr(issue_time,1,7) as st_month,
        '火车票' as '品类',
        order_id,
        requisition_id,
        order_member_id as member_id,
        institution_id,
        company_id,
        company_name,
        count(distinct case when ticket_type_name in ('首次出票','出后退') THEN ticket_id ELSE null end) as tkt_nit_cnt
        ,sum(case when ticket_type_name in ('首次出票','出后退') then (personal_pay+company_pay+reserve_service_fee)/100
        when ticket_type_name in ('改签','改后退') then (personal_pay+company_pay)/100
        when to_date(refund_time)>'1970-01-01' then -user_refund_amount/100 else 0 end ) as real_gmv
    from es_dw.dwm_ent_trd_ticket_train_df
    where 
        dt = date_sub(current_date,1)
        and to_date(issue_time) between '2025-06-01' and '2025-08-31'      
        and is_test_company = 0
    group by substr(issue_time,1,7),
        order_id,
        requisition_id,
        order_member_id,
        institution_id,
        company_id,
        company_name
) ,
t_hotel_ord as (

        
        select 
            substr(confirm_time,1,7) as st_month,
            '酒店' as '品类'
            ,order_id
            ,requisition_id
            ,member_id
            ,institution_id
            ,company_id
            ,company_name
            ,sum(night_cnt) as tkt_nit_cnt
            ,sum(bill_total_cost+coupon_amount-refund_amount)/100 as real_gmv 
        from es_dw.dm_ent_hotel_order_info_df
        where dt = date_sub(current_date,1)
        and to_date(confirm_time)<>'1970-01-01'
        and is_test_company = 0
        and is_test_ord = 0
        and supplier_id != 23
        and travel_type=0
        and to_date(confirm_time) between '2025-06-01' and '2025-08-31'  
    group by
            substr(confirm_time,1,7)  
            ,order_id 
            ,requisition_id
            ,member_id
            ,institution_id
            ,company_id
            ,company_name

)


    select 
        st_month
        ,company_id
        ,company_name
        ,sum(tkt_nit_cnt) as '商旅预订间夜票张数'
        ,sum(case when '品类' = '酒店' then tkt_nit_cnt else 0 end) as '酒店预订间夜数'
        ,sum(case when '品类' in ('机票','火车票') then tkt_nit_cnt else 0 end) as '机火预订票张数'
        ,sum(case when '品类' = '机票' then tkt_nit_cnt else 0 end) as '机票预订票张数'
        ,sum(case when '品类' = '火车票' then tkt_nit_cnt else 0 end) as '火车票预订票张数'
        ,sum(case when requisition_id>0 then tkt_nit_cnt else 0 end) as '有差旅单商旅预订间夜票张数'
        ,sum(case when '品类' = '酒店' and requisition_id>0 then tkt_nit_cnt else 0 end) as '有差旅单酒店预订间夜数'
        ,sum(case when '品类' in ('机票','火车票') and requisition_id>0 then tkt_nit_cnt else 0 end) as '有差旅单机火间夜票张数'
        ,sum(case when '品类' = '机票' and requisition_id>0 then tkt_nit_cnt else 0 end) as '有差旅单机票预订票张数'
        ,sum(case when '品类' = '火车票' and requisition_id>0 then tkt_nit_cnt else 0 end) as '有差旅单火车票预订票张数'
        ,sum(case when (requisition_id=0 or requisition_id='') and institution_id>0 then tkt_nit_cnt else 0 end) as '有万能制度间夜票张数'
        ,sum(case when requisition_id>0 then tkt_nit_cnt else 0 end)/sum(tkt_nit_cnt) as '有差旅单间夜票张数占比'
        ,sum(case when '品类' = '酒店' and requisition_id>0 then tkt_nit_cnt else 0 end)/sum(case when '品类' = '酒店' then tkt_nit_cnt else 0 end) as '有差旅单酒店间夜占比'
        ,sum(case when '品类' in ('机票','火车票') and requisition_id>0 then tkt_nit_cnt else 0 end)/sum(case when '品类' in ('机票','火车票') then tkt_nit_cnt else 0 end) as '有差旅单机火票张占比'
        ,sum(case when '品类' = '机票' and requisition_id>0 then tkt_nit_cnt else 0 end)/sum(case when '品类' = '机票' then tkt_nit_cnt else 0 end) as '有差旅单机票票张占比'
        ,sum(case when '品类' = '火车票' and requisition_id>0 then tkt_nit_cnt else 0 end)/sum(case when '品类' = '火车票' then tkt_nit_cnt else 0 end)  as '有差旅单火车票票张占比'

    from 
    (
        select * from t_flight_ord 
        union all 
        select * from t_train_ord 
        union all 
        select * from t_hotel_ord 
    )t 
    group by st_month
    ,company_id
    ,company_name`
  },

    updated: "",
    notes: `客户在预订商旅业务过程中产生的成交金额，即客户应付金额的截面值减去客户应退金额，按照业务节点来看，指的是“出+改-退”之后产生的成交金额。统计指标按维度划分因公因私、国内国际、线上线下、线上客服代订、手工单。`,
    sql: `SELECT stat_date
        , SUM(real_gmv / 100)                                    AS '商旅GMV'
        , SUM(CASE WHEN is_personal = 0 THEN real_gmv / 100 END) AS '因公商旅GMV'
        , SUM(CASE WHEN is_personal = 1 THEN real_gmv / 100 END) AS '因私商旅GMV'
        , SUM(CASE WHEN stat_type = 1 THEN real_gmv / 100 END)   AS '国内商旅GMV'
        , SUM(CASE WHEN stat_type = 2 THEN real_gmv / 100 END)   AS '国际商旅GMV'
        , SUM(CASE
            WHEN sub_business_type = 1 AND source_channel <> 10005 THEN real_gmv / 100
        END)                                                     AS '线上单商旅GMV'
        , SUM(CASE
            WHEN sub_business_type = 2 OR(sub_business_type = 1 AND source_channel = 10005) THEN real_gmv / 100
            ELSE 0
        END)                                                     AS '手工单商旅GMV'
        , SUM(CASE WHEN source_channel = 10001 THEN real_gmv / 100 END) AS '线上客服代订商旅GMV'  -- 预定渠道：客服代订（有差旅制度）
        , SUM(CASE
            WHEN sub_business_type = 1 AND stat_type = 1 THEN real_gmv / 100
        END)                                                     AS '国内线上商旅GMV'
FROM   es_dw.app_ent_biz_ddo_merge_df
WHERE  dt = DATE_SUB(CURRENT_DATE, 1)
        AND SUBSTR(stat_date, 1, 10) > '1970-01-01'
        AND SUBSTR(stat_date, 1, 10) BETWEEN '\${start_date}' AND '\${end_date}'
        AND company_id NOT IN (1125917396247053, 1125917619516646)  -- 排除异常客户
        AND  ! (is_didi = 1 AND is_personal = 0)  -- 非滴滴因公
GROUP BY stat_date`

  {
    id: "SL-087",
    name: `根据商旅客户来源拆解商旅GMV（含AE）`,
    category: "商旅_规模",
    tags: ["交叉渗透客户商旅GMV（含AE）", "用车新客交叉渗透GMV（含AE）", "用车老客交叉渗透GMV（含AE）", "一站式（同时）激活客户商旅GMV", "纯新商旅GMV（含AE）"],
    scenario: "规模",
    tables: "",
    frequency: "T+1",
    owner: "weimeifang",
    updated: "",
    notes: `针对商旅GMV按照是否交叉渗透客户、是否用车新老客户、是否一站式激活了户、是否纯新客户计算商旅GMV`,
    sql: `WITH t_com
    AS (
        SELECT company_id
                , company_name
        FROM   es_dw.dim_ent_user_company
        WHERE  dt = DATE_SUB(current_date, 1)
                AND is_test_company = 0
    ),
    t_biz
    AS (
        SELECT company_id
                , company_name
                , revised_cf_activate_date
                , SUBSTR(revised_cf_activate_date, 1, 7) AS revised_cf_month
                , TO_DATE(first_reserve_time)            AS first_reserve_date
        FROM   es_dw.dwm_ent_user_company_biz_fl_df
        WHERE  dt = DATE_SUB(current_date, 1)
                AND TO_DATE(first_reserve_time) > '1970-01-01'  -- 有因公或者因私激活
    ),
    tblTyActivate
    AS (
        SELECT company_id
                , travel_last_activate_date  -- 用车最近激活日期(划转口径, 未流失过则使用企支or个垫日期)
                , SUBSTR(travel_last_activate_date, 1, 7) AS travel_act_month
                , SUBSTR(dt, 1, 4)                        AS dt_year
        FROM   es_dw.dwm_ent_user_company_activate_df
        WHERE  dt = DATE_SUB(current_date, 1)
                AND TO_DATE(travel_last_activate_date) > '1970-10-01'
    ),
    t_cross
    AS (
        SELECT company_id
                , company_name
                , CASE
                    WHEN source_catogary = '2.1.1.客户来源-交叉新-CSM一部-在线交通' THEN '商机打开给在线交通'
                    WHEN source_catogary = '2.1.2.客户来源-交叉新-CSM一部-网约出行' THEN '商机打开给网约出行'
                    WHEN source_catogary = '2.1.3.客户来源-交叉新-CSM一部'      THEN 'CSM一部自留'
                END AS '交叉渗透（不含AE）项目客户来源'
                , CASE
                    WHEN source_catogary IN('2.1.1.客户来源-交叉新-CSM一部-在线交通', '2.1.2.客户来源-交叉新-CSM一部-网约出行', '2.1.3.客户来源-交叉新-CSM一部') THEN '是'
                    ELSE '否'
                END AS '是否交叉渗透客户（不含AE）'
        FROM   es_test.es_biz_monitor_company_annalysis
        WHERE  dt = DATE_SUB(current_date, 1)
                AND st_month = SUBSTR(DATE_SUB(current_date, 1), 1, 7)
    ),
    t_detail
    AS (
        SELECT t_com.company_id                               AS '公司id'
                , t_com.company_name                          AS '公司名称'
                , NVL(t_biz.first_reserve_date, '1970-01-01') AS '商旅首次预订日期'
                , NVL(t_biz.revised_cf_activate_date, '1970-01-01') AS '商旅因公激活日期'
                , NVL(tblTyActivate.travel_last_activate_date, '1970-01-01') AS '用车最近激活日期'
                , CASE WHEN t_biz.company_id IS NOT NULL THEN '是' ELSE '否' END AS '是否以商旅为主体分析'
                , CASE
                    WHEN tblTyActivate.company_id IS NOT NULL THEN '是'
                    ELSE '否'
                END                                           AS '是否以用车为主体分析'
                , CASE
                    WHEN NVL(tblTyActivate.travel_last_activate_date, '1970-01-01') > '1970-01-01' AND NVL(t_biz.revised_cf_activate_date, '1970-01-01') > '1970-01-01' THEN MONTHS_BETWEEN(tblTyActivate.travel_act_month, t_biz.revised_cf_month)
                    WHEN NVL(tblTyActivate.travel_last_activate_date, '1970-01-01') = '1970-01-01' AND NVL(t_biz.revised_cf_activate_date, '1970-01-01') > '1970-01-01' THEN - 999
                    WHEN NVL(tblTyActivate.travel_last_activate_date, '1970-01-01') > '1970-01-01' AND NVL(t_biz.revised_cf_activate_date, '1970-01-01') = '1970-01-01' THEN - 999
                    ELSE - 999
                END                                           AS '用车商旅激活时间差'
                , CASE
                    WHEN NVL(tblTyActivate.travel_last_activate_date, '1970-01-01') > '1970-01-01' AND NVL(t_biz.revised_cf_activate_date, '1970-01-01') > '1970-01-01' AND MONTHS_BETWEEN(tblTyActivate.travel_act_month, t_biz.revised_cf_month) < - 3                                                                                  THEN '交叉渗透'  -- 先激活用车
                    WHEN NVL(tblTyActivate.travel_last_activate_date, '1970-01-01') > '1970-01-01' AND NVL(t_biz.revised_cf_activate_date, '1970-01-01') > '1970-01-01' AND MONTHS_BETWEEN(tblTyActivate.travel_act_month, t_biz.revised_cf_month) >= - 3 AND MONTHS_BETWEEN(tblTyActivate.travel_act_month, t_biz.revised_cf_month) <= 3 THEN '一站式激活'  -- 用车商旅同时激活
                    WHEN NVL(tblTyActivate.travel_last_activate_date, '1970-01-01') > '1970-01-01' AND NVL(t_biz.revised_cf_activate_date, '1970-01-01') > '1970-01-01' AND MONTHS_BETWEEN(tblTyActivate.travel_act_month, t_biz.revised_cf_month) > 3                                                                                    THEN '纯新'  -- 先激活商旅
                    WHEN NVL(tblTyActivate.travel_last_activate_date, '1970-01-01') = '1970-01-01' AND NVL(t_biz.revised_cf_activate_date, '1970-01-01') > '1970-01-01'                                                                                                                                                                   THEN '纯新'  -- 仅激活商旅
                    WHEN NVL(t_biz.revised_cf_activate_date, '1970-01-01') = '1970-01-01' AND NVL(t_biz.first_reserve_date, '1970-01-01') > '1970-01-01'                                                                                                                                                                                  THEN '仅因私激活（未因公激活）'  -- 仅因私激活商旅
                    WHEN NVL(tblTyActivate.travel_last_activate_date, '1970-01-01') > '1970-01-01' AND NVL(t_biz.revised_cf_activate_date, '1970-01-01') = '1970-01-01'                                                                                                                                                                   THEN '未激活（未因or公因私激活）'  -- 仅激活商旅
                    ELSE '其他'
                END                                           AS '商旅客户来源'
                , NVL(t_cross.'是否交叉渗透客户（不含AE）', '否') AS '是否交叉渗透客户（不含AE）'
                , NVL('交叉渗透（不含AE）项目客户来源',  - 999) AS '交叉渗透（不含AE）项目客户来源'
                , CASE
                    WHEN NVL(tblTyActivate.travel_last_activate_date, '1970-01-01') > '1970-01-01' AND NVL(t_biz.revised_cf_activate_date, '1970-01-01') > '1970-01-01' AND MONTHS_BETWEEN(tblTyActivate.travel_act_month, t_biz.revised_cf_month) < - 3 AND YEAR(tblTyActivate.travel_last_activate_date) = YEAR(t_biz.revised_cf_activate_date) THEN '是'
                    ELSE '否'
                END                                           AS '是否用车新客渗透商旅'
                , CASE
                    WHEN NVL(tblTyActivate.travel_last_activate_date, '1970-01-01') > '1970-01-01' AND NVL(t_biz.revised_cf_activate_date, '1970-01-01') > '1970-01-01' AND MONTHS_BETWEEN(tblTyActivate.travel_act_month, t_biz.revised_cf_month) < - 3 AND YEAR(tblTyActivate.travel_last_activate_date) < YEAR(t_biz.revised_cf_activate_date) THEN '是'
                    ELSE '否'
                END                                           AS '​是否用车老客渗透商旅'
        FROM   t_com LEFT JOIN t_biz
                    ON t_com.company_id = t_biz.company_id
                LEFT JOIN tblTyActivate
                    ON t_com.company_id = tblTyActivate.company_id
                LEFT JOIN t_cross
                    ON t_com.company_id = t_cross.company_id
        WHERE  t_biz.company_id IS NOT NULL
                OR tblTyActivate.company_id IS NOT NULL
    )
SELECT t_ddo.stat_date
        , t_ddo.company_id
        , SUM(CASE WHEN '商旅客户来源' = '交叉渗透' THEN t_ddo.real_gmv / 100 ELSE 0 END) AS '交叉渗透客户商旅GMV（含AE）'
        , SUM(CASE WHEN '是否用车新客渗透商旅' = '是' THEN t_ddo.real_gmv / 100 ELSE 0 END) AS '用车新客交叉渗透GMV（含AE）'
        , SUM(CASE WHEN '​是否用车老客渗透商旅' = '是' THEN t_ddo.real_gmv / 100 ELSE 0 END) AS '用车老客交叉渗透GMV（含AE）'

    sql: `SELECT stat_date

            WHEN ticket_channel = '自营IBE+' OR ticket_channel = '易宝B2B' OR(ticket_channel = '线下客服' AND NVL(t_supplier.supplier_name, t_ord.supplier_name) LIKE '%小桔%') THEN real_gmv

            , supplier_id
            , supplier_name
            , ticket_channel
            , SUM(real_gmv / 100) AS real_gmv
    FROM   es_dw.app_ent_flight_merge_ddo_df
    WHERE  dt = DATE_SUB(current_date, 1)
            AND company_id NOT IN (1125917396247053, 1125917619516646)
            AND  ! (is_didi = 1 AND is_personal = 0)
    GROUP BY stat_date
            , supplier_id
            , supplier_name
            , ticket_channel
) t_ord
LEFT JOIN (
    SELECT t.*
    FROM   (
        SELECT original_supplier_name
                , supplier_name
                , CASE source_type
                    WHEN 0 THEN '小桔自营'
                    WHEN 1 THEN '航司直连'
                    WHEN 2 THEN '中航服'
                    WHEN 3 THEN '蜗牛'
                    WHEN 4 THEN '线下外采'
                    WHEN 5 THEN '美亚商旅'
                    WHEN 6 THEN '空港易行'
                    ELSE '其他'
                END AS source_type
                , ROW_NUMBER() OVER(PARTITION BY original_supplier_name ORDER BY supplier_name) AS rk
        FROM   es_test.dim_flight_supplier_name
        WHERE  dt = DATE_SUB(current_date, 1)
    ) t
    WHERE  rk = 1
) t_supplier
    ON t_ord.supplier_name = t_supplier.original_supplier_name

GROUP BY stat_date`

    select 
        substr(query_date,1,10) query_date
        ,(sum(norm_all_prd_room_brk_customer_prd_cnt) + sum(good1_all_prd_room_brk_customer_prd_cnt)  + sum(good2_all_prd_room_brk_customer_prd_cnt))/sum(strategy_cnt) as cmp_prd_cnt -- 注意分母
        ,(sum(norm_cmp_htl_cnt) + sum(good1_cmp_htl_cnt)  + sum(good2_cmp_htl_cnt))/sum(strategy_cnt) as cmp_htl_cnt
        ,sum(norm_cmp_htl_cnt) as norm_cmp_htl_cnt -- '非好价比价酒店次数'
        ,sum(good1_cmp_htl_cnt) as good1_cmp_htl_cnt -- '好价基础版比价酒店次数'
        ,sum(good2_cmp_htl_cnt) as good2_cmp_htl_cnt -- '好价加磅版比价酒店次数' 
        ,sum(norm_all_prd_room_brk_customer_bm_cnt) as norm_all_prd_room_brk_customer_bm_cnt -- 非好价客户全部产品BM次数，也是非好价客户产品BM次数
        ,sum(norm_all_prd_room_brk_customer_prd_cnt) as norm_all_prd_room_brk_customer_prd_cnt -- 非好价客户全部产品比价次数，也是非好价客户产品比价次数
        ,sum(norm_norm_prd_room_brk_customer_bm_cnt) as norm_norm_prd_room_brk_customer_bm_cnt -- 非好价客户普通产品BM次数
        ,sum(norm_norm_prd_room_brk_customer_prd_cnt) as norm_norm_prd_room_brk_customer_prd_cnt -- 非好价客户普通产品BM次数
        ,sum(good1_all_prd_room_brk_customer_bm_cnt) as good1_all_prd_room_brk_customer_bm_cnt -- 好价基础版全部产品BM次数，好价基础版产品BM次数
        ,sum(good1_all_prd_room_brk_customer_prd_cnt) as good1_all_prd_room_brk_customer_prd_cnt -- 好价基础版全部产品比价次数，好价基础版产品比价次数'
        ,sum(good2_all_prd_room_brk_customer_bm_cnt) as good2_all_prd_room_brk_customer_bm_cnt -- 好价加磅版全部产品BM次数，好价基础版产品BM次数
        ,sum(good2_all_prd_room_brk_customer_prd_cnt) as good2_all_prd_room_brk_customer_prd_cnt  -- 好价加磅版全部产品比价次数，好价基础版产品比价次数

        --浏览占比
        ,sum(low_member_cnt)/sum(member_cnt) as low_member_per
        --间夜占比
        ,sum(not_good_price_night_cnt) as not_good_price_night_cnt
        ,sum(good_price_night_cnt_fix) as good_price_night_cnt_fix
        ,sum(special_night_cnt) as special_night_cnt

        ,sum(not_good_price_night_cnt) / sum(all_night_cnt_fix) as norm_cus_night_per-- '非好价客户间夜占比'
        ,sum(good_price_night_cnt_fix) / sum(all_night_cnt_fix) as good_cus_night_per -- '好价客户间夜占比'
        ,sum(special_night_cnt) / sum(all_night_cnt_fix) as special_cus_night_per -- '特殊客户间夜占比'
        ,sum(good_price_base_night_cnt_fix) / sum(good_price_base_night_cnt_fix + good_price_advanced_night_cnt_fix) as good1_cus_night_per-- '好价基础版间夜占比'
        ,sum(good_price_advanced_night_cnt_fix) / sum(good_price_base_night_cnt_fix + good_price_advanced_night_cnt_fix) as good2_cus_night_per -- '好价加磅版间夜占比'
        
        --2025年12月以前老口径，2025年12月开始新口径，其中2025年12月1日-2025年12月11日没有好价策略，2025年12月12日开始有好价策略
        ,sum(norm_all_prd_room_brk_customer_bm_cnt) / sum(norm_all_prd_room_brk_customer_prd_cnt) as norm_all_prd_room_brk_customer_bmr -- '非好价客户全部产品卖价BM率'
        ,sum(norm_norm_prd_room_brk_customer_bm_cnt) / sum(norm_norm_prd_room_brk_customer_prd_cnt) as norm_norm_prd_room_brk_customer_bmr -- '非好价客户普通产品卖价BM率'
        ,sum(good1_all_prd_room_brk_customer_bm_cnt) / sum(good1_all_prd_room_brk_customer_prd_cnt) as good1_all_prd_room_brk_customer_bmr -- '好价基础版产品卖价BM率' -- 也是'好价基础版全部产品卖价BM率'
        ,sum(good1_norm_prd_room_brk_customer_bm_cnt) / sum(good1_norm_prd_room_brk_customer_prd_cnt) as good1_norm_prd_room_brk_customer_bmr -- '好价基础版普通产品卖价BM率' 
        ,sum(good2_all_prd_room_brk_customer_bm_cnt) / sum(good2_all_prd_room_brk_customer_prd_cnt) as good2_all_prd_room_brk_customer_bmr -- '好价加磅版产品卖价BM率' -- 也是'好价加磅版全部产品卖价BM率'
        ,sum(good2_norm_prd_room_brk_customer_bm_cnt) / sum(good2_norm_prd_room_brk_customer_prd_cnt) as good2_norm_prd_room_brk_customer_bmr -- '好价加磅版普通产品卖价BM率' 
        --好价客户产品BM率 = 好价基础版BM率 * 好价基础版本间夜占比 + 好价加磅版BM率 * 好价加磅版本间夜占比
        ,sum(good1_all_prd_room_brk_customer_bm_cnt) / sum(good1_all_prd_room_brk_customer_prd_cnt) * sum(good_price_base_night_cnt_fix)/sum(good_price_base_night_cnt_fix + good_price_advanced_night_cnt_fix) 
            + sum(good2_all_prd_room_brk_customer_bm_cnt) / sum(good2_all_prd_room_brk_customer_prd_cnt) * sum(good_price_advanced_night_cnt_fix)/sum(good_price_base_night_cnt_fix + good_price_advanced_night_cnt_fix) as  good_all_prd_room_brk_customer_bmr-- '好价客户产品卖价BM率' -- 也是'好价客户全部产品卖价BM率' 
        ,sum(special_all_prd_room_brk_supplier_bm_cnt) / sum(special_all_prd_room_brk_supplier_prd_cnt) as special_all_prd_room_brk_supplier_bmr -- '特殊客户产品卖价BM率' -- 也是'特殊客户全部产品卖价BM率'

        ---------------------------
        

    from 
    (
            ---天数据聚合
            select t_cmp.query_date
                    ,strategy_cnt     
                    ,norm_all_prd_room_brk_customer_prd_cnt
                    ,norm_norm_prd_room_brk_customer_prd_cnt
                    ,norm_all_prd_room_brk_customer_bm_cnt
                    ,norm_norm_prd_room_brk_customer_bm_cnt
                    --好价客户比价
                    ,good1_all_prd_room_brk_customer_prd_cnt
                    ,good1_norm_prd_room_brk_customer_prd_cnt
                    ,good1_all_prd_room_brk_customer_bm_cnt
                    ,good1_norm_prd_room_brk_customer_bm_cnt
                    ,good2_all_prd_room_brk_customer_prd_cnt
                    ,good2_norm_prd_room_brk_customer_prd_cnt
                    ,good2_all_prd_room_brk_customer_bm_cnt
                    ,good2_norm_prd_room_brk_customer_bm_cnt
                    --- 特殊客户比价
                    ,special_all_prd_room_brk_supplier_prd_cnt
                    ,special_norm_prd_room_brk_supplier_prd_cnt
                    ,special_all_prd_room_brk_supplier_bm_cnt
                    ,special_norm_prd_room_brk_supplier_bm_cnt

                    ,norm_cmp_htl_cnt -- '非好价比价酒店次数'
                    ,good1_cmp_htl_cnt -- '好价基础版比价酒店次数'
                    ,good2_cmp_htl_cnt -- '好价加磅版比价酒店次数' 
                    -- 浏览占比
                    ,coalesce(t_view.low_member_cnt,0) as low_member_cnt
                    ,coalesce(t_view.member_cnt,0) as member_cnt
                    -- 间夜占比
                    ,coalesce(not_good_price_night_cnt,0) as not_good_price_night_cnt     --非好价比价-间夜数
                    ,coalesce(good_price_base_night_cnt_fix,0) as good_price_base_night_cnt_fix
                    ,coalesce(good_price_advanced_night_cnt_fix,0) as good_price_advanced_night_cnt_fix
                    ,coalesce(good_price_night_cnt_fix,0) as good_price_night_cnt_fix
                    ,coalesce(special_night_cnt,0) as special_night_cnt 
                    ,coalesce(all_night_cnt_fix,0) as all_night_cnt_fix

                    
            from (
                select query_date
                    ,count(distinct good_price_strategy) as strategy_cnt
                    --非好价客户比价
                    ,count(case when good_price_strategy='非好价比价' and is_all_prd_room_brk_customer_cmp = 1 then concat(query_date,didi_hotel_id) else null end) as  norm_all_prd_room_brk_customer_prd_cnt
                    ,count(case when good_price_strategy='非好价比价' and is_norm_prd_room_brk_customer_cmp = 1 then concat(query_date,didi_hotel_id) else null end) as norm_norm_prd_room_brk_customer_prd_cnt
                    ,count(case when good_price_strategy='非好价比价' and is_all_prd_room_brk_customer_cmp = 1 and customer_compare_result in ('beat','meet') then concat(query_date,didi_hotel_id) else null end) as norm_all_prd_room_brk_customer_bm_cnt
                    ,count(case when good_price_strategy='非好价比价' and is_norm_prd_room_brk_customer_cmp = 1 and customer_compare_result in ('beat','meet') then concat(query_date,didi_hotel_id) else null end) as norm_norm_prd_room_brk_customer_bm_cnt
                    --好价客户比价
                    ,count(case when good_price_strategy='好价基础版' and is_all_prd_room_brk_customer_cmp = 1 then concat(query_date,didi_hotel_id) else null end) as good1_all_prd_room_brk_customer_prd_cnt
                    ,count(case when good_price_strategy='好价基础版' and is_norm_prd_room_brk_customer_cmp = 1 then concat(query_date,didi_hotel_id) else null end) as good1_norm_prd_room_brk_customer_prd_cnt
                    ,count(case when good_price_strategy='好价基础版' and is_all_prd_room_brk_customer_cmp = 1 and customer_compare_result in ('beat','meet') then concat(query_date,didi_hotel_id) else null end) as good1_all_prd_room_brk_customer_bm_cnt
                    ,count(case when good_price_strategy='好价基础版' and is_norm_prd_room_brk_customer_cmp = 1 and customer_compare_result in ('beat','meet') then concat(query_date,didi_hotel_id) else null end) as good1_norm_prd_room_brk_customer_bm_cnt
                    ,count(case when good_price_strategy='好价加磅版' and is_all_prd_room_brk_customer_cmp = 1 then concat(query_date,didi_hotel_id) else null end) as good2_all_prd_room_brk_customer_prd_cnt
                    ,count(case when good_price_strategy='好价加磅版' and is_norm_prd_room_brk_customer_cmp = 1 then concat(query_date,didi_hotel_id) else null end) as good2_norm_prd_room_brk_customer_prd_cnt
                    ,count(case when good_price_strategy='好价加磅版' and is_all_prd_room_brk_customer_cmp = 1 and customer_compare_result in ('beat','meet') then concat(query_date,didi_hotel_id) else null end) as good2_all_prd_room_brk_customer_bm_cnt
                    ,count(case when good_price_strategy='好价加磅版' and is_norm_prd_room_brk_customer_cmp = 1 and customer_compare_result in ('beat','meet') then concat(query_date,didi_hotel_id) else null end) as good2_norm_prd_room_brk_customer_bm_cnt
                    --- 特殊客户比价
                    ,count(case when good_price_strategy='非好价比价' and is_all_prd_room_brk_supplier_cmp = 1 then concat(query_date,didi_hotel_id) else null end) as special_all_prd_room_brk_supplier_prd_cnt
                    ,count(case when good_price_strategy='非好价比价' and is_norm_prd_room_brk_supplier_cmp = 1 then concat(query_date,didi_hotel_id) else null end) as special_norm_prd_room_brk_supplier_prd_cnt
                    ,count(case when good_price_strategy='非好价比价' and is_all_prd_room_brk_supplier_cmp = 1 and supplier_compare_result in ('beat','meet') then concat(query_date,didi_hotel_id) else null end) as special_all_prd_room_brk_supplier_bm_cnt
                    ,count(case when good_price_strategy='非好价比价' and is_norm_prd_room_brk_supplier_cmp = 1 and supplier_compare_result in ('beat','meet') then concat(query_date,didi_hotel_id) else null end) as special_norm_prd_room_brk_supplier_bm_cnt

                    ,count(distinct case when good_price_strategy='非好价比价' and is_all_prd_room_brk_customer_cmp = 1 then concat(query_date,didi_hotel_id) else null end) as norm_cmp_htl_cnt -- '非好价比价酒店次数'
                    ,count(distinct case when good_price_strategy='好价基础版' and is_all_prd_room_brk_customer_cmp = 1 then concat(query_date,didi_hotel_id) else null end) as good1_cmp_htl_cnt -- '好价基础版比价酒店次数'
                    ,count(distinct case when good_price_strategy='好价加磅版' and is_all_prd_room_brk_customer_cmp = 1 then concat(query_date,didi_hotel_id) else null end) as good2_cmp_htl_cnt -- '好价加磅版比价酒店次数'
                from es_dw.dm_ent_mkt_hotel_price_comparison_df 
                where dt = date_sub(current_date,1)
                and query_date between '2025-11-01' and date_sub(current_date,1)
                and room_rank_bf_assoc between 1 and 4
                and sample_type not in ('好价样本','固定样本')
                and (
                            is_all_prd_room_brk_customer_cmp = 1 --'全部产品早卖价比价'-- 含低价产品的全部产品
                            or is_norm_prd_room_brk_customer_cmp = 1 --'普通产品早卖价比价'-- 
                            or is_all_prd_room_brk_supplier_cmp = 1 --'全部产品早底价比价'--
                            or is_norm_prd_room_brk_supplier_cmp = 1 --'普通产品早底价比价'--
                )
                group by query_date

            ) t_cmp 
            left join 
            (
                select a.calendar_date as stat_date
                    ,case when calendar_date<'2025-01-01' then 0 else coalesce(b.low_member_cnt,0) end as low_member_cnt --低价产品浏览次数
                    ,coalesce(b.member_cnt,0) as member_cnt --总浏览次数
                    ,coalesce(b.low_member_rate,0) as low_member_rate -- 低价产品浏览占比
                from (
                    select calendar_date
                    from whole_dw.dim_date
                    where dt= date_sub(current_date,1)
                    and calendar_date between '2024-03-04' and '2025-11-30'
                ) a 
                left join (
                select stat_date --统计时间
                    ,case when dt<'2025-01-01' then 0 else low_hotel_member_cnt end as low_member_cnt --低价产品访问次数
                    ,hotel_member_cnt member_cnt --总访问人次
                    ,low_hotel_member_cnt/hotel_member_cnt as low_member_rate
                from es_dw.dwm_ent_log_omega_stat_info_view_di
                where dt between '2024-03-04' and '2025-11-30'
                ) b 
                on a.calendar_date=b.stat_date
            ) as t_view on t_cmp.query_date = t_view.stat_date
            left join 
            (
                SELECT
                    stat_date,
                    good_price_base_night_cnt,      --好价基础版-间夜数
                    good_price_advanced_night_cnt,  --好价加磅版-间夜数
                    special_night_cnt,   --特殊版-间夜数
                    not_good_price_night_cnt,       --非好价比价-间夜数
                    all_night_cnt                   --所有产品-间夜数
                    --2025-12-12没有好价比价数据，间夜占比人为设置为0，通过修改分子分母实现
                    ,case when stat_date < '2025-12-12' then 0 else good_price_base_night_cnt end as good_price_base_night_cnt_fix
                    ,case when stat_date < '2025-12-12' then 0 else good_price_advanced_night_cnt end as good_price_advanced_night_cnt_fix
                    ,case when stat_date < '2025-12-12' then 0 else good_price_base_night_cnt end + case when stat_date < '2025-12-12' then 0 else good_price_advanced_night_cnt end as good_price_night_cnt_fix
                    ,case when stat_date < '2025-12-12' then special_night_cnt + not_good_price_night_cnt else all_night_cnt end as all_night_cnt_fix
                FROM
                    es_dw.dm_ent_mkt_hotel_price_company_type_night_cnt_df
                WHERE
                    dt = date_sub(current_date,1)    --dt = date_sub(current_date,1)
                    and stat_date between '2025-12-01' and date_sub(current_date,1)

            ) as t_night_per on t_cmp.query_date = t_night_per.stat_date
    ) t_date_concat
    group by substr(query_date,1,10) 
)t_detail 

;`
  },
  {
    id: "SL-097",
    name: `酒店比价间夜覆盖率`,
    category: "商旅_价格",
    tags: ["酒店比价GMV覆盖率"],
    scenario: "供应链_价格",
    tables: "",
    frequency: "T+1",
    owner: "weimeifang",
    updated: "",
    notes: `统计周期内比过价的酒店产生的酒店间夜数（不含协议酒店）在会员酒店间夜数中的占比。 酒店比价间夜覆盖率 = 比价酒店间夜数（不含协议酒店）/会员酒店间夜数 无特殊说明，通常指的是卖价比价。`,
    sql: `with t_detai as (
select 
t_ord.*
,case when t_cmp.didi_hotel_id is not null then 1 else 0 end as is_comp 
from
(
    select 
        didi_hotel_id 
        ,sum(real_confirm_amt)/100 as real_confirm_amt
        ,sum(night_cnt) as night_cnt
    from es_dw.app_ent_hotel_merge_ddo_df 
    where dt=date_sub('$[YYYY-MM-DD -1D]',1)
    and stat_date between '2025-12-01' and '2025-12-31'
    and is_agreement=0
    and is_didi=0
    group by 
        didi_hotel_id
)t_ord 
left join 
(
    select 

        didi_hotel_id 
    from es_dw.dm_ent_mkt_hotel_price_comparison_df
    where dt=date_sub('$[YYYY-MM-DD -1D]',1)
    and is_all_prd_room_brk_customer_cmp=1
    and query_date between '2025-11-01' and '2025-12-31'
    -- and  room_rank_bf_assoc between 1 and 4
    group by didi_hotel_id

)t_cmp on t_ord.didi_hotel_id = t_cmp.didi_hotel_id
)

select 
    sum(real_confirm_amt) as '会员酒店GMV'
    ,sum(case when is_comp=1 then real_confirm_amt else 0 end) as ' 比价酒店GMV（不含协议酒店）'
    ,sum(case when is_comp=1 then real_confirm_amt else 0 end)/sum(real_confirm_amt) as '酒店比价GMV覆盖率'
    ,sum(night_cnt) as '会员酒店间夜数'
    ,sum(case when is_comp=1 then night_cnt else 0 end) as '比价酒店间夜数（不含协议酒店'
    ,sum(case when is_comp=1 then night_cnt else 0 end)/sum(night_cnt) as '酒店比价间夜覆盖率'
from t_detai`
